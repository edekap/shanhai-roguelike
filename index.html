        ctx.drawImage(drawImg,-imgS,-imgS,imgS*2,imgS*2);
        ctx.restore();
      }
      // 攻击蓄力：粒子汇聚效果（不画圈）
      if(this.attackAnim>0){
        const ap=this.attackAnim/0.8;
        const ec=this.color;
        const ecr=parseInt(ec.substr(1,2),16),ecg=parseInt(ec.substr(3,2),16),ecb=parseInt(ec.substr(5,2),16);
        ctx.shadowColor=this.color;ctx.shadowBlur=25*ap;
        // 蓄力粒子向中心汇聚（不画圆圈线）
        for(let i=0;i<8;i++){
          const a=t*2+i*Math.PI/4;
          const r=s*1.2+ap*15-Math.sin(t*3+i)*5;
          ctx.fillStyle=`rgba(${ecr},${ecg},${ecb},${0.7+ap*0.3})`;
          ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,3+ap*2,0,Math.PI*2);ctx.fill();
        }
        ctx.shadowBlur=0;
      }
      // 减速：冰晶粒子+蓝色色调（不画圈）
      if(this.slowFactor<1){
        ctx.save();
        ctx.globalAlpha=0.15;
        ctx.fillStyle='#a8d8ff';
        ctx.beginPath();ctx.arc(0,0,s*1.0,0,Math.PI*2);ctx.fill();
        ctx.restore();
        for(let i=0;i<5;i++){
          const a=(i/5)*Math.PI*2+Date.now()/500;
          const r=s*0.9+Math.sin(Date.now()/300+i)*5;
          ctx.fillStyle='rgba(220,240,255,0.9)';
          ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,2.5,0,Math.PI*2);ctx.fill();
        }
      }
    }else{
      // 图片未加载时的fallback：彩色圆形+名称首字
      ctx.fillStyle=this.hitFlash>0?'#ffffff':this.color;
      ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=3;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font=`bold ${s*0.8}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(this.name[0]||'?',0,0);
    }
    // 移除纯装饰外圈，只保留功能性光环（无敌/护盾/蓄力）
    ctx.shadowBlur=0;
    ctx.restore();
    // 绘制分身（九尾狐）
    if(this.clones&&this.clones.length>0){
      for(const c of this.clones){
        ctx.save();ctx.translate(c.x,c.y);ctx.globalAlpha=0.6;ctx.scale(0.6,0.6);
        ctx.shadowColor=c.color;ctx.shadowBlur=10;
        const cImg=BOSS_IMAGES[this.bossIndex];
        if(cImg&&cImg.complete&&cImg.naturalWidth>0){
          const cS=c.size*2.2;
          ctx.drawImage(cImg,-cS,-cS,cS*2,cS*2);
        }else{
          ctx.fillStyle=c.color;
          ctx.beginPath();ctx.arc(0,0,c.size,0,Math.PI*2);ctx.fill();
        }
        ctx.restore();ctx.globalAlpha=1;
      }
    }
    // 血量
    ctx.fillStyle=this.isSuper?'#bc8cff':'#ff6b6b';ctx.font='bold 14px Arial';ctx.textAlign='center';
    ctx.shadowColor=this.isSuper?'#bc8cff':'#ff6b6b';ctx.shadowBlur=8;
    ctx.fillText(`${this.name} ${Math.ceil(this.health)}/${this.maxHealth}`,this.x,this.y+this.size+24);
    ctx.shadowBlur=0;
  }
  // 刑天专属绘制：使用PNG图片+视觉增强（与其他boss统一风格）
  drawXingtian(s){
    const t=Date.now()/300;
    // ===== 外层暗红能量粒子（不画圈）=====
    const auraPulse=0.5+Math.sin(t*2)*0.5;
    ctx.shadowColor='#8b0000';ctx.shadowBlur=15+auraPulse*10;
    for(let i=0;i<10;i++){
      const a=t*1.5+i*Math.PI/5;
      const r=s*1.2+Math.sin(t*2+i)*10;
      ctx.fillStyle=`rgba(139,0,0,${0.4+auraPulse*0.3})`;
      ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,3+auraPulse*2,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;
    // ===== 主体：程序化绘制刑天 =====
    this.drawXingtianBody(s,t);
    // 攻击蓄力：粒子汇聚（不画圈）
    if(this.attackAnim>0){
      const ap=this.attackAnim/0.8;
      ctx.shadowColor='#ff4500';ctx.shadowBlur=20*ap;
      for(let i=0;i<10;i++){
        const a=t*3+i*Math.PI/5;
        const r=s*1.3+ap*15-Math.sin(t*3+i)*8;
        ctx.fillStyle=`rgba(255,${60+Math.sin(t*2+i)*40},0,${0.7+ap*0.3})`;
        ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,4+ap*2,0,Math.PI*2);ctx.fill();
      }
      ctx.shadowBlur=0;
    }
    // ===== 狂暴红色粒子（phase≥1，不画圈）=====
    if(this.rage){
      const ragePulse=0.5+Math.sin(t*5)*0.5;
      ctx.shadowColor='#ff0000';ctx.shadowBlur=20*ragePulse;
      for(let i=0;i<12;i++){
        const a=t*3+i*Math.PI/6;
        const r=s*1.3+Math.sin(t*4+i)*8;
        ctx.fillStyle=`rgba(255,${30+Math.sin(t*2+i)*30},0,${0.7+ragePulse*0.3})`;
        ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,4,0,Math.PI*2);ctx.fill();
      }
      ctx.shadowBlur=0;
    }
    // ===== 终极形态：紫金战魂粒子（phase≥2，不画圈）=====
    if(this.finalBossPhase>=2){
      const ultPulse=0.5+Math.sin(t*7)*0.5;
      ctx.shadowColor='#bc8cff';ctx.shadowBlur=25*ultPulse;
      for(let i=0;i<8;i++){
        const a=t*2.5+i*Math.PI/4;
        const r=s*1.35+Math.sin(t*4+i)*6;
        ctx.shadowColor='#ffd700';ctx.shadowBlur=10;
        ctx.fillStyle=`rgba(255,215,0,${0.7+ultPulse*0.3})`;
        ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,4,0,Math.PI*2);ctx.fill();
      }
      ctx.shadowBlur=0;
    }
    // ===== 减速：冰晶粒子（不画圈）=====
    if(this.slowFactor<1){
      for(let i=0;i<6;i++){
        const a=(i/6)*Math.PI*2+Date.now()/500;
        const r=s*1.0+Math.sin(Date.now()/300+i)*6;
        ctx.fillStyle='rgba(220,240,255,0.9)';
        ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,3,0,Math.PI*2);ctx.fill();
      }
    }
    // ===== 3个环绕战魂球（围绕刑天本体旋转，有接触伤害） =====
    // 注意：这里在ctx.translate(boss.x,boss.y)之后的局部坐标系中绘制
    for(const orb of this.orbitingOrbs){
      const ox=Math.cos(orb.angle)*orb.radius;
      const oy=Math.sin(orb.angle)*orb.radius*0.7; // 椭圆轨道
      ctx.save();
      ctx.translate(ox,oy);
      const orbPulse=0.7+Math.sin(t*4+orb.angle)*0.3;
      // 外层光晕
      ctx.shadowColor='#ff4500';ctx.shadowBlur=20*orbPulse;
      ctx.fillStyle=`rgba(255,69,0,${0.3+orbPulse*0.2})`;
      ctx.beginPath();ctx.arc(0,0,orb.size*1.5,0,Math.PI*2);ctx.fill();
      // 主体球（渐变）
      const orbGrad=ctx.createRadialGradient(0,0,0,0,0,orb.size);
      orbGrad.addColorStop(0,'#ffaa00');
      orbGrad.addColorStop(0.5,'#ff4500');
      orbGrad.addColorStop(1,'#8b0000');
      ctx.fillStyle=orbGrad;
      ctx.beginPath();ctx.arc(0,0,orb.size,0,Math.PI*2);ctx.fill();
      // 核心（白色发光）
      ctx.shadowColor='#ffffff';ctx.shadowBlur=10;
      ctx.fillStyle=`rgba(255,255,255,${orbPulse})`;
      ctx.beginPath();ctx.arc(0,0,orb.size*0.3,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      // 拖尾粒子
      for(let i=1;i<=3;i++){
        const ta=orb.angle-i*0.15;
        const tx=Math.cos(ta)*orb.radius;
        const ty=Math.sin(ta)*orb.radius*0.7;
        ctx.fillStyle=`rgba(255,69,0,${0.4-i*0.1})`;
        ctx.beginPath();ctx.arc(tx-ox,ty-oy,orb.size*0.3*(1-i*0.2),0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }
  }
  // 刑天主体程序化绘制：无头战神形象（胸腹脸+肌肉臂膀+干戚武器）
  drawXingtianBody(s,t){
    // 威武刑天：巨体型无头战神，熔岩裂纹肌体，血红巨眼，巨型干戚
    const breath=1+Math.sin(t*1.5)*0.04;
    const armSway=Math.sin(t*1.2)*0.12;
    const rageMode=this.finalBossPhase>=1;
    // ===== 0. 暗黑能量背景场（熔岩光环）=====
    ctx.save();
    ctx.scale(breath,breath);
    const auraR=s*1.3;
    const auraGrad=ctx.createRadialGradient(0,0,s*0.5,0,0,auraR);
    auraGrad.addColorStop(0,'rgba(255,50,0,0.3)');
    auraGrad.addColorStop(0.5,'rgba(139,0,0,0.2)');
    auraGrad.addColorStop(1,'rgba(20,0,0,0)');
    ctx.fillStyle=auraGrad;
    ctx.beginPath();ctx.arc(0,0,auraR,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // ===== 1. 巨型躯干（宽阔的倒三角胸甲，深红到暗黑渐变）=====
    ctx.save();
    ctx.scale(breath,breath);
    const bodyGrad=ctx.createLinearGradient(0,-s*0.9,0,s*0.9);
    bodyGrad.addColorStop(0,'#2a0808');
    bodyGrad.addColorStop(0.2,'#5c1010');
    bodyGrad.addColorStop(0.5,'#8b0000');
    bodyGrad.addColorStop(0.8,'#4a0808');
    bodyGrad.addColorStop(1,'#1a0303');
    ctx.fillStyle=bodyGrad;
    // 宽肩巨躯（比原来更宽更大）
    ctx.beginPath();
    ctx.moveTo(-s*0.75,-s*0.75);                    // 左肩（更宽）
    ctx.quadraticCurveTo(-s*0.9,-s*0.3,-s*0.6,s*0.5); // 左腰
    ctx.quadraticCurveTo(-s*0.3,s*0.85,0,s*0.88);     // 底部
    ctx.quadraticCurveTo(s*0.3,s*0.85,s*0.6,s*0.5);   // 右腰
    ctx.quadraticCurveTo(s*0.9,-s*0.3,s*0.75,-s*0.75);// 右肩
    ctx.quadraticCurveTo(0,-s*0.95,-s*0.75,-s*0.75);  // 颈部（无头）
    ctx.closePath();
    ctx.fill();
    // 躯干厚重轮廓
    ctx.strokeStyle='#0a0202';ctx.lineWidth=3;ctx.stroke();
    // ===== 熔岩裂纹（胸口流淌的岩浆纹路，威慑力）=====
    ctx.strokeStyle=`rgba(255,${80+Math.sin(t*3)*30},0,0.7)`;
    ctx.lineWidth=2;ctx.shadowColor='#ff4500';ctx.shadowBlur=8;
    // 主裂纹（从肩到腰）
    for(let i=-1;i<=1;i+=2){
      ctx.beginPath();
      ctx.moveTo(i*s*0.3,-s*0.6);
      ctx.quadraticCurveTo(i*s*0.5,-s*0.2,i*s*0.35,s*0.3);
      ctx.quadraticCurveTo(i*s*0.25,s*0.5,i*s*0.2,s*0.7);
      ctx.stroke();
    }
    // 横向裂纹
    for(let i=0;i<4;i++){
      const y=-s*0.4+i*s*0.25;
      const w=s*0.4-i*s*0.05;
      ctx.beginPath();
      ctx.moveTo(-w,y);ctx.quadraticCurveTo(0,y+3,w,y);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
    // 肌肉分隔线
    ctx.strokeStyle='rgba(255,80,30,0.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,-s*0.6);ctx.lineTo(0,s*0.2);ctx.stroke();
    // 胸肌下缘
    ctx.beginPath();ctx.moveTo(-s*0.55,-s*0.25);ctx.quadraticCurveTo(0,-s*0.05,s*0.55,-s*0.25);ctx.stroke();
    ctx.restore();

    // ===== 2. 血红巨眼（以乳为目，凶狠发光，rage时变红）=====
    const eyePulse=0.7+Math.sin(t*4)*0.3;
    const eyeColor=rageMode?'#ff0000':'#ffaa00';
    const eyeGlow=rageMode?'#ff3030':'#ff8800';
    ctx.save();
    for(const side of[-1,1]){
      const ex=side*s*0.35;
      const ey=-s*0.3;
      // 眼眶（深色凹陷）
      ctx.fillStyle='#0a0202';
      ctx.beginPath();ctx.arc(ex,ey,s*0.16,0,Math.PI*2);ctx.fill();
      // 眼球（发光，愤怒血红/金色）
      ctx.shadowColor=eyeGlow;ctx.shadowBlur=20*eyePulse;
      const eyeGrad=ctx.createRadialGradient(ex,ey,0,ex,ey,s*0.13);
      eyeGrad.addColorStop(0,'#ffffff');
      eyeGrad.addColorStop(0.3,eyeColor);
      eyeGrad.addColorStop(1,rageMode?'#8b0000':'#cc6600');
      ctx.fillStyle=eyeGrad;
      ctx.beginPath();ctx.arc(ex,ey,s*0.13,0,Math.PI*2);ctx.fill();
      // 瞳孔（竖瞳，凶猛）
      ctx.shadowBlur=0;
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.ellipse(ex,ey,s*0.04,s*0.1,0,0,Math.PI*2);ctx.fill();
      // 高光
      ctx.fillStyle=`rgba(255,255,255,${eyePulse*0.8})`;
      ctx.beginPath();ctx.arc(ex-side*s*0.03,ey-s*0.03,s*0.025,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();

    // ===== 3. 巨口（以脐为口，大嘴+利獠牙，凶残）=====
    ctx.save();
    // 嘴巴（更大，张开时更凶）
    const mouthOpen=0.7+Math.sin(t*2)*0.3;
    ctx.fillStyle='#0a0202';
    ctx.beginPath();ctx.ellipse(0,s*0.4,s*0.3,s*0.15*mouthOpen,0,0,Math.PI*2);ctx.fill();
    // 嘴唇（暗红）
    ctx.strokeStyle='#5c1010';ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(0,s*0.4,s*0.3,s*0.15*mouthOpen,0,0,Math.PI*2);ctx.stroke();
    // 獠牙（上下各4颗，更大更尖）
    ctx.fillStyle='#f5f0e0';
    ctx.shadowColor='#fff';ctx.shadowBlur=3;
    for(let i=0;i<4;i++){
      const x=-s*0.18+i*s*0.12;
      // 上獠牙
      ctx.beginPath();
      ctx.moveTo(x-s*0.028,s*0.32);ctx.lineTo(x+s*0.028,s*0.32);
      ctx.lineTo(x,s*0.32+s*0.12*mouthOpen);
      ctx.closePath();ctx.fill();
      // 下獠牙
      ctx.beginPath();
      ctx.moveTo(x-s*0.028,s*0.48);ctx.lineTo(x+s*0.028,s*0.48);
      ctx.lineTo(x,s*0.48-s*0.1*mouthOpen);
      ctx.closePath();ctx.fill();
    }
    ctx.shadowBlur=0;
    ctx.restore();

    // ===== 4. 巨臂（粗壮肌肉臂膀，向两侧大幅伸展）=====
    ctx.save();
    ctx.scale(breath,breath);
    // 左臂
    ctx.save();
    ctx.translate(-s*0.75,-s*0.45);
    ctx.rotate(-0.4+armSway);
    const armGrad=ctx.createLinearGradient(0,0,-s*0.6,s*0.6);
    armGrad.addColorStop(0,'#5c1010');
    armGrad.addColorStop(0.5,'#8b0000');
    armGrad.addColorStop(1,'#3a0808');
    ctx.fillStyle=armGrad;
    ctx.strokeStyle='#0a0202';ctx.lineWidth=2.5;
    // 粗壮手臂（比原来更粗）
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.quadraticCurveTo(-s*0.35,s*0.05,-s*0.6,s*0.45);
    ctx.quadraticCurveTo(-s*0.68,s*0.55,-s*0.55,s*0.68);
    ctx.quadraticCurveTo(-s*0.3,s*0.55,-s*0.15,s*0.35);
    ctx.quadraticCurveTo(-s*0.05,s*0.15,0,s*0.1);
    ctx.closePath();
    ctx.fill();ctx.stroke();
    // 肌肉纹理
    ctx.strokeStyle='rgba(255,60,0,0.4)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-s*0.1,s*0.1);ctx.quadraticCurveTo(-s*0.3,s*0.3,-s*0.5,s*0.5);ctx.stroke();
    // 拳头
    ctx.fillStyle='#5c1010';
    ctx.beginPath();ctx.arc(-s*0.55,s*0.6,s*0.12,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#0a0202';ctx.stroke();
    ctx.restore();
    // 右臂
    ctx.save();
    ctx.translate(s*0.75,-s*0.45);
    ctx.rotate(0.4-armSway);
    ctx.fillStyle=armGrad;
    ctx.strokeStyle='#0a0202';ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.quadraticCurveTo(s*0.35,s*0.05,s*0.6,s*0.45);
    ctx.quadraticCurveTo(s*0.68,s*0.55,s*0.55,s*0.68);
    ctx.quadraticCurveTo(s*0.3,s*0.55,s*0.15,s*0.35);
    ctx.quadraticCurveTo(s*0.05,s*0.15,0,s*0.1);
    ctx.closePath();
    ctx.fill();ctx.stroke();
    ctx.strokeStyle='rgba(255,60,0,0.4)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(s*0.1,s*0.1);ctx.quadraticCurveTo(s*0.3,s*0.3,s*0.5,s*0.5);ctx.stroke();
    ctx.fillStyle='#5c1010';
    ctx.beginPath();ctx.arc(s*0.55,s*0.6,s*0.12,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#0a0202';ctx.stroke();
    ctx.restore();
    ctx.restore();

    // ===== 5. 巨型干戚武器（双手持巨斧+巨盾，发光威武）=====
    ctx.save();
    const halberdGlow=0.6+Math.sin(t*3)*0.4;
    // 左侧巨斧
    ctx.save();
    ctx.translate(-s*1.15,s*0.2);
    ctx.rotate(-0.6+armSway);
    // 斧柄（更长更粗）
    ctx.fillStyle='#3a1a0a';
    ctx.fillRect(-s*0.035,0,s*0.07,s*0.8);
    ctx.strokeStyle='#1a0a05';ctx.lineWidth=1;ctx.strokeRect(-s*0.035,0,s*0.07,s*0.8);
    // 巨斧头（更大，月牙形锋刃）
    ctx.shadowColor='#ff4500';ctx.shadowBlur=15*halberdGlow;
    const axeGrad=ctx.createLinearGradient(-s*0.3,0,0,0);
    axeGrad.addColorStop(0,'#e0e0e0');
    axeGrad.addColorStop(0.5,'#a8a8a8');
    axeGrad.addColorStop(1,'#666');
    ctx.fillStyle=axeGrad;
    ctx.beginPath();
    ctx.moveTo(0,-s*0.05);
    ctx.quadraticCurveTo(-s*0.35,-s*0.15,-s*0.3,s*0.05);
    ctx.quadraticCurveTo(-s*0.15,s*0.12,0,s*0.1);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#444';ctx.lineWidth=1.5;ctx.stroke();
    // 斧刃锋利高光
    ctx.strokeStyle=`rgba(255,255,255,${halberdGlow*0.8})`;ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(-s*0.3,-s*0.1);ctx.quadraticCurveTo(-s*0.2,-s*0.12,-s*0.05,-s*0.05);
    ctx.stroke();
    ctx.restore();
    // 右侧巨盾
    ctx.save();
    ctx.translate(s*1.15,s*0.2);
    ctx.rotate(0.6-armSway);
    // 盾柄
    ctx.fillStyle='#3a1a0a';
    ctx.fillRect(-s*0.035,0,s*0.07,s*0.8);
    // 巨盾（更大，圆形带尖刺）
    ctx.shadowColor='#ffd700';ctx.shadowBlur=12*halberdGlow;
    const shieldGrad=ctx.createRadialGradient(0,0,0,0,0,s*0.22);
    shieldGrad.addColorStop(0,'#8b0000');
    shieldGrad.addColorStop(0.7,'#5c1010');
    shieldGrad.addColorStop(1,'#2a0505');
    ctx.fillStyle=shieldGrad;
    ctx.beginPath();ctx.arc(0,0,s*0.22,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffd700';ctx.lineWidth=2.5;ctx.stroke();
    // 盾牌尖刺（8个方向）
    ctx.fillStyle='#a8a8a8';
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*s*0.22,Math.sin(a)*s*0.22);
      ctx.lineTo(Math.cos(a)*s*0.28,Math.sin(a)*s*0.28);
      ctx.lineTo(Math.cos(a+0.15)*s*0.22,Math.sin(a+0.15)*s*0.22);
      ctx.closePath();ctx.fill();
    }
    // 盾牌中心金色图腾
    ctx.fillStyle='#ffd700';
    ctx.shadowColor='#ffd700';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(0,0,s*0.06,0,Math.PI*2);ctx.fill();
    // 图腾十字纹
    ctx.strokeStyle='#8b0000';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-s*0.04,0);ctx.lineTo(s*0.04,0);
    ctx.moveTo(0,-s*0.04);ctx.lineTo(0,s*0.04);ctx.stroke();
    ctx.restore();
    ctx.restore();

    // ===== 6. 环绕暗黑能量粒子（威慑感）=====
    for(let i=0;i<8;i++){
      const a=t*1.5+i*Math.PI/4;
      const r=s*1.1+Math.sin(t*2+i)*8;
      const px=Math.cos(a)*r,py=Math.sin(a)*r;
      ctx.fillStyle=`rgba(255,${50+Math.sin(t*3+i)*30},0,${0.5+Math.sin(t*2+i)*0.3})`;
      ctx.shadowColor='#ff4500';ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;

    // ===== 7. 受击白色闪光 =====
    if(this.hitFlash>0){
      ctx.save();
      ctx.globalAlpha=this.hitFlash*0.5;
      ctx.fillStyle='#ffffff';
      ctx.beginPath();
      ctx.moveTo(-s*0.75,-s*0.75);
      ctx.quadraticCurveTo(-s*0.9,-s*0.3,-s*0.6,s*0.5);
      ctx.quadraticCurveTo(-s*0.3,s*0.85,0,s*0.88);
      ctx.quadraticCurveTo(s*0.3,s*0.85,s*0.6,s*0.5);
      ctx.quadraticCurveTo(s*0.9,-s*0.3,s*0.75,-s*0.75);
      ctx.quadraticCurveTo(0,-s*0.95,-s*0.75,-s*0.75);
      ctx.closePath();ctx.fill();
      ctx.restore();
    }
  }
}

// ==================== 宠物类 ====================
class Pet {
  constructor(def,stage=0){
    this.def=def; this.stage=stage; this.x=0; this.y=0; this.size=18;
    this.alive=true; this.attackTimer=2; this.orbitAngle=0;
    this.attackAnim=0; this.glowPhase=0;
  }
  update(dt){
    if(!player)return;
    this.orbitAngle+=dt*1.2;
    this.glowPhase+=dt*3;
    if(this.attackAnim>0)this.attackAnim-=dt*3;
    // 饕餮仔：主动索敌，飞向最近敌人而非绕玩家转
    if(this.def.attack==='devour'){
      let nearestE=null,nd=520;
      for(const e of enemies){if(!e.alive)continue;const d=dist(this.x,this.y,e.x,e.y);if(d<nd){nd=d;nearestE=e;}}
      if(boss&&boss.alive){const d=dist(this.x,this.y,boss.x,boss.y);if(d<nd*1.4)nearestE=boss;}
      if(nearestE){
        const dx=nearestE.x-this.x,dy=nearestE.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d>5){this.x+=dx/d*180*dt;this.y+=dy/d*180*dt;}
      }else{
        const tx=player.x+Math.cos(this.orbitAngle)*100, ty=player.y+Math.sin(this.orbitAngle)*100;
        this.x+=(tx-this.x)*3*dt; this.y+=(ty-this.y)*3*dt;
      }
    }else{
      const tx=player.x+Math.cos(this.orbitAngle)*100, ty=player.y+Math.sin(this.orbitAngle)*100;
      this.x+=(tx-this.x)*3*dt; this.y+=(ty-this.y)*3*dt;
    }
    this.attackTimer-=dt;
    if(this.attackTimer<=0){this.attackTimer=Math.max(1.6, 2.8-this.stage*0.3); this.attack(); this.attackAnim=1;}
  }
  attack(){
    const evo=this.def.evoStats[this.stage];
    let target=null,nd=480;
    for(const e of enemies){if(!e.alive)continue;const d=dist(this.x,this.y,e.x,e.y);if(d<nd){nd=d;target=e;}}
    if(boss&&boss.alive){const d=dist(this.x,this.y,boss.x,boss.y);if(d<nd*1.5)target=boss;}
    if(!target){
      // 超级饕餮仔：即使无目标也释放吞噬吸引
      if(this.def.attack==='devour'){this.devourAttack(evo,8*evo.dmgMul*(this.def.isSuper?1.5:1),null);return;}
      return;
    }
    const dmg=8*evo.dmgMul*(this.def.isSuper?1.5:1);
    const atk=this.def.attack;
    if(atk==='charm'){
      // 魅惑减速周围敌人（粉色魅惑光环）
      spawnParticles(target.x,target.y,'#ff69b4',25);
      pushFloatingText(target.x,target.y-20,'魅惑!','#ff69b4',0.8);
      const r=100*evo.rangeMul;
      for(const e of enemies){if(!e.alive)continue;if(dist(target.x,target.y,e.x,e.y)<r){e.takeDamage(dmg*0.5);if(e.slowFactor!==undefined){e.slowFactor=Math.min(e.slowFactor,0.4);e.slowTimer=2;}}}
      if(boss&&boss.alive&&dist(target.x,target.y,boss.x,boss.y)<r){boss.takeDamage(dmg);if(boss.slowFactor!==undefined){boss.slowFactor=Math.min(boss.slowFactor,0.6);boss.slowTimer=2;}}
    }else if(atk==='fireRain'){
      // 天降火雨
      const cnt=evo.count||3;
      for(let i=0;i<cnt;i++){
        const mx=target.x+rand(-70,70),my=target.y+rand(-70,70);
        spawnParticles(mx,my,'#ff4500',20);
        fireEffects.push({x:mx,y:my,radius:55,damage:dmg*0.4,life:1.5,maxLife:1.5,burnDmg:dmg*0.4,tick:0,chain:0});
        for(const e of enemies){if(!e.alive)continue;if(dist(mx,my,e.x,e.y)<60)e.takeDamage(dmg);}
        if(boss&&boss.alive&&dist(mx,my,boss.x,boss.y)<60)boss.takeDamage(dmg);}
    }else if(atk==='poison'){
      // 九头毒液范围攻击
      spawnParticles(target.x,target.y,'#7cfc00',30);
      pushFloatingText(target.x,target.y-20,'中毒!','#7cfc00',0.8);
      const r=95*evo.rangeMul;
      for(const e of enemies){if(!e.alive)continue;if(dist(target.x,target.y,e.x,e.y)<r){e.takeDamage(dmg);if(e.slowFactor!==undefined){e.slowFactor=Math.min(e.slowFactor,0.5);e.slowTimer=2;}}}
      if(boss&&boss.alive&&dist(target.x,target.y,boss.x,boss.y)<r){boss.takeDamage(dmg);if(boss.slowFactor!==undefined){boss.slowFactor=Math.min(boss.slowFactor,0.7);boss.slowTimer=2;}}
    }else if(atk==='rockThrow'){
      // 投掷巨石分裂攻击
      const cnt=evo.count||1;
      for(let i=0;i<cnt;i++){
        const mx=target.x+rand(-40,40),my=target.y+rand(-40,40);
        spawnParticles(mx,my,'#daa520',25);
        pushFloatingText(mx,my-15,'-'+Math.ceil(dmg),'#daa520',0.6);
        for(const e of enemies){if(!e.alive)continue;if(dist(mx,my,e.x,e.y)<65)e.takeDamage(dmg);}
        if(boss&&boss.alive&&dist(mx,my,boss.x,boss.y)<65)boss.takeDamage(dmg);
        for(let j=0;j<4;j++){const a=(j/4)*Math.PI*2;const sx=mx+Math.cos(a)*45,sy=my+Math.sin(a)*45;spawnParticles(sx,sy,'#daa520',8);for(const e of enemies){if(!e.alive)continue;if(dist(sx,sy,e.x,e.y)<35)e.takeDamage(dmg*0.5);}}
      }
    }else if(atk==='lava'){
      // 熔岩池持续范围伤害
      const cnt=evo.count||3;
      for(let i=0;i<cnt;i++){
        const mx=target.x+rand(-80,80),my=target.y+rand(-80,80);
        spawnParticles(mx,my,'#ff6347',25);
        fireEffects.push({x:mx,y:my,radius:75,damage:dmg*0.5,life:3,maxLife:3,burnDmg:dmg*0.5,tick:0,chain:0});
        for(const e of enemies){if(!e.alive)continue;if(dist(mx,my,e.x,e.y)<75)e.takeDamage(dmg);}
        if(boss&&boss.alive&&dist(mx,my,boss.x,boss.y)<75)boss.takeDamage(dmg);}
    }else if(atk==='wind'){
      // 英招雏：风刃切割多个敌人
      const cnt=evo.count||2;
      spawnParticles(target.x,target.y,'#20b2aa',30);
      pushFloatingText(target.x,target.y-20,'风刃!','#20b2aa',0.8);
      for(let i=0;i<cnt;i++){
        const a=(i/cnt)*Math.PI*2;
        const fx=target.x+Math.cos(a)*120,fy=target.y+Math.sin(a)*120;
        spawnParticles(fx,fy,'#7fffd4',15);
        fireEffects.push({x:fx,y:fy,radius:50,damage:0,life:1.0,maxLife:1.0,burnDmg:0,tick:0,chain:0,windBlade:true});
        for(const e of enemies){if(!e.alive)continue;if(dist(fx,fy,e.x,e.y)<55)e.takeDamage(dmg);}
        if(boss&&boss.alive&&dist(fx,fy,boss.x,boss.y)<55)boss.takeDamage(dmg);
      }
    }else if(atk==='water'){
      // 计蒙子：水柱范围溅射攻击
      const r=70*(evo.rangeMul||1);
      spawnParticles(target.x,target.y,'#4682b4',35);
      pushFloatingText(target.x,target.y-20,'水柱!','#4682b4',0.8);
      fireEffects.push({x:target.x,y:target.y,radius:r,damage:0.5,life:1.5,maxLife:1.5,burnDmg:dmg*0.3,tick:0,chain:0,waterRift:true});
      for(const e of enemies){if(!e.alive)continue;if(dist(target.x,target.y,e.x,e.y)<r){e.takeDamage(dmg);if(e.slowFactor!==undefined){e.slowFactor=Math.min(e.slowFactor,0.6);e.slowTimer=1.5;}}}
      if(boss&&boss.alive&&dist(target.x,target.y,boss.x,boss.y)<r){boss.takeDamage(dmg);if(boss.slowFactor!==undefined){boss.slowFactor=Math.min(boss.slowFactor,0.7);boss.slowTimer=1.5;}}
    }else if(atk==='chaos'){
      // 穷奇崽：混沌弹幕追踪敌人
      const cnt=evo.count||3;
      spawnParticles(target.x,target.y,'#6a0dad',40);
      pushFloatingText(target.x,target.y-20,'混沌!','#9370db',1.0);
      for(let i=0;i<cnt;i++){
        const a=(i/cnt)*Math.PI*2+rand(-0.3,0.3);
        const eb=new EnemyBullet(this.x,this.y,a,200,dmg*0.4,'#9370db');
        eb.homing=1.2; eb.life=3; eb.fromPet=true;
        enemyBullets.push(eb);
      }
      // 范围混沌爆发
      fireEffects.push({x:target.x,y:target.y,radius:60,damage:0,life:1.0,maxLife:1.0,burnDmg:0,tick:0,chain:0,voidRift:true});
      for(const e of enemies){if(!e.alive)continue;if(dist(target.x,target.y,e.x,e.y)<65)e.takeDamage(dmg*0.5);}
      if(boss&&boss.alive&&dist(target.x,target.y,boss.x,boss.y)<65)boss.takeDamage(dmg*0.5);
    }else if(atk==='devour'){
      this.devourAttack(evo,dmg,target);
    }
  }
  // 饕餮仔吞噬吸引：以宠物当前位置为中心（已主动飞向敌人），大范围吸引+伤害
  devourAttack(evo,dmg=0,target=null){
    const r=170*(evo.rangeMul||1); // 满阶340范围
    const cx=this.x,cy=this.y;
    spawnParticles(cx,cy,'#4b0082',35);
    pushFloatingText(cx,cy-20,'吞噬!','#9370db',0.8);
    // 吞噬视觉警告圈
    bossWarnings.push({x:cx,y:cy,r:r,timer:0.5,maxTimer:0.5,color:'rgba(147,112,219'});
    for(const e of enemies){
      if(!e.alive)continue;
      const d=dist(cx,cy,e.x,e.y);
      if(d<r){
        const a=Math.atan2(cy-e.y,cx-e.x);
        const pull=Math.min(80,d*0.6);
        e.x+=Math.cos(a)*pull; e.y+=Math.sin(a)*pull;
        e.takeDamage(dmg);
        spawnParticles(e.x,e.y,'#9370db',6);
      }
    }
    if(boss&&boss.alive){
      const d=dist(cx,cy,boss.x,boss.y);
      if(d<r){const a=Math.atan2(cy-boss.y,cx-boss.x);boss.x+=Math.cos(a)*25;boss.y+=Math.sin(a)*25;boss.takeDamage(dmg*1.5);}
    }
  }
  draw(){
    ctx.save();ctx.translate(this.x,this.y);
    if(this.attackAnim>0){
      const pulseR=this.size+this.attackAnim*25;
      ctx.strokeStyle=this.def.isSuper?'rgba(255,215,0,'+this.attackAnim*0.6+')':'rgba(88,166,255,'+this.attackAnim*0.5+')';
      ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,pulseR,0,Math.PI*2);ctx.stroke();
    }
    if(this.def.isSuper){
      const glow=0.5+Math.sin(this.glowPhase)*0.2;
      ctx.shadowColor='#ffd700';ctx.shadowBlur=15*glow;
    }
    const breath=1+Math.sin(this.glowPhase)*0.08;
    ctx.scale(breath,breath);
    // 优先使用Boss图片（缩小绘制为宝宝形态）
    const petImg=BOSS_IMAGES[this.def.bossIdx];
    if(petImg&&petImg.complete&&petImg.naturalWidth>0){
      ctx.save();
      ctx.beginPath();ctx.arc(0,0,this.size,0,Math.PI*2);ctx.clip();
      ctx.drawImage(petImg,-this.size,-this.size,this.size*2,this.size*2);
      ctx.restore();
      // 描边
      ctx.strokeStyle=this.def.isSuper?'#ffd970':'#58a6ff';
      ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,this.size,0,Math.PI*2);ctx.stroke();
    }else{
      ctx.font='22px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(this.def.icon,0,0);
    }
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffd700';ctx.font='bold 10px Arial';
    ctx.fillText('★'.repeat(this.stage+1),0,this.size+5);
    ctx.restore();
  }
}

// ==================== 特效更新与绘制 ====================
// 直接伤害辅助：绕过无敌帧扣血(用于刑天范围技能，避免伤害丢失)
// 考虑护盾/闪避，但不触发新的无敌帧，确保多段范围伤害全部生效
function applyDirectDamage(p,dmg,label,color){
  if(!p||!p.alive)return;
  // 闪避仍可生效
  if(p.dodgeChance&&Math.random()<p.dodgeChance){
    pushFloatingText(p.x,p.y-30,'闪避!','#58a6ff',0.8);
    spawnParticles(p.x,p.y,'#58a6ff',10); return;
  }
  // 护盾抵消（不触发invincible，避免吞掉后续伤害）
  if(p.shield>0){
    p.shield--; spawnParticles(p.x,p.y,'#58a6ff',12);
    pushFloatingText(p.x,p.y-30,'护盾抵消!','#58a6ff',0.8);
    updateUI(); return;
  }
  // 直接扣血
  p.health-=dmg;
  p.hitFlash=0.1;
  if(label)pushFloatingText(p.x,p.y-30,`${label} -${Math.ceil(dmg)}`,color||'#ff4500',1.2);
  spawnParticles(p.x,p.y,color||'#ff4500',15);
  if(p.health<=0)triggerDeathAnimation();
  updateUI();
}
function updateFireEffects(dt){
  for(const f of fireEffects){
    f.life-=dt; f.tick-=dt;
    if(f.tick<=0){
      f.tick=0.3;
      for(const e of enemies){if(!e.alive)continue;if(dist(f.x,f.y,e.x,e.y)<f.radius)e.takeDamage(f.burnDmg);}
      if(boss&&boss.alive&&dist(f.x,f.y,boss.x,boss.y)<f.radius)boss.takeDamage(f.burnDmg);
      // 熔岩池/危险区域对玩家造成持续伤害（仅限标记了playerHazard的效果，绕过无敌帧）
      if(f.burnDmg>0&&f.playerHazard&&player&&player.alive&&dist(f.x,f.y,player.x,player.y)<f.radius){
        // 直接扣血，绕过无敌帧（用playerHazardTick控制频率）
        if(!player._hazardTick||player._hazardTick<=0){
          player.health-=f.burnDmg;
          player._hazardTick=0.5; // 每0.5秒一次伤害
          spawnParticles(player.x,player.y,'#ff4500',8);
          pushFloatingText(player.x,player.y-30,`-${Math.ceil(f.burnDmg)}`,'#ff4500',0.8);
          if(player.health<=0)triggerDeathAnimation();
          updateUI();
        }
      }
      // 连锁
      if(f.chain>0){
        let nearest=null,nd=f.radius*2;
        for(const e of enemies){if(!e.alive)continue;const d=dist(f.x,f.y,e.x,e.y);if(d> f.radius&&d<nd){nd=d;nearest=e;}}
        if(nearest){fireEffects.push({x:nearest.x,y:nearest.y,radius:f.radius*0.7,damage:f.burnDmg,life:1,maxLife:1,burnDmg:f.burnDmg,tick:0,chain:f.chain-1});}
      }
    }
  }
  fireEffects=fireEffects.filter(f=>f.life>0);
}
function drawFireEffects(){
  for(const f of fireEffects){
    if(!isFinite(f.x)||!isFinite(f.y)||!f.radius||f.radius<=0||!isFinite(f.radius))continue;
    const lifeRatio=f.life/f.maxLife;
    // 渐入渐出：开始0.15秒渐入，结束前0.2秒渐出，中间全程满alpha
    let fadeIn=1;
    const age=f.maxLife-f.life;
    if(age<0.15)fadeIn=age/0.15;
    else if(lifeRatio<0.2)fadeIn=lifeRatio/0.2;
    const a=Math.min(1,fadeIn)*0.85;
    const grad=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.radius);
    if(f.voidRift){
      // 虚空之弓裂缝：紫色（加强透明度和粒子感）
      grad.addColorStop(0,`rgba(216,180,254,${a*1.8})`);
      grad.addColorStop(0.4,`rgba(192,132,252,${a*1.4})`);
      grad.addColorStop(0.7,`rgba(168,85,247,${a*1.0})`);
      grad.addColorStop(1,`rgba(126,34,206,0)`);
    }else if(f.blackhole){
      // 饕餮黑洞：紫色漩涡(多层旋转环)
      grad.addColorStop(0,`rgba(88,28,135,${a*2.5})`);
      grad.addColorStop(0.3,`rgba(147,51,234,${a*1.8})`);
      grad.addColorStop(0.6,`rgba(192,132,252,${a*1.0})`);
      grad.addColorStop(1,`rgba(126,34,206,0)`);
    }else if(f.lavaPool){
      // 烛龙熔岩池：橙红冒泡
      grad.addColorStop(0,`rgba(255,220,100,${a*2.0})`);
      grad.addColorStop(0.4,`rgba(255,100,0,${a*1.5})`);
      grad.addColorStop(0.8,`rgba(200,40,0,${a*0.8})`);
      grad.addColorStop(1,`rgba(120,20,0,0)`);
    }else if(f.waterRift){
      // 计蒙水柱：蓝色（加强）
      grad.addColorStop(0,`rgba(147,197,253,${a*1.8})`);
      grad.addColorStop(0.5,`rgba(70,130,180,${a*1.2})`);
      grad.addColorStop(1,`rgba(30,80,150,0)`);
    }else if(f.windBlade){
      // 英招风刃：青绿色锐利新月
      grad.addColorStop(0,`rgba(167,243,208,${a*1.6})`);
      grad.addColorStop(0.6,`rgba(45,212,191,${a*1.0})`);
      grad.addColorStop(1,`rgba(20,184,166,0)`);
    }else if(f.hammerBlast){
      // 震天锤爆炸冲击波：橙色环
      grad.addColorStop(0,`rgba(251,146,60,${a*0.6})`);
      grad.addColorStop(0.7,`rgba(234,88,12,${a*0.8})`);
      grad.addColorStop(1,`rgba(124,45,18,0)`);
    }else{
      // 火焰：加强默认透明度
      grad.addColorStop(0,`rgba(255,180,50,${a*1.5})`);
      grad.addColorStop(0.5,`rgba(255,100,0,${a*1.0})`);
      grad.addColorStop(1,`rgba(255,40,0,0)`);
    }
    // 维度裂隙跳过圆形径向背景(它使用自己的长条形绘制)
    if(!f.dimensionRift){
      ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(f.x,f.y,f.radius,0,Math.PI*2); ctx.fill();
    }
    // 虚空裂缝额外绘制能量裂纹(穷奇维度裂隙用dimensionRift专属绘制，跳过)
    if(f.voidRift&&!f.dimensionRift&&a>0.05){
      ctx.save();
      ctx.strokeStyle=`rgba(216,180,254,${a*2})`;
      ctx.lineWidth=2;
      for(let i=0;i<4;i++){
        const ang=(Date.now()/300+i*Math.PI/2)%Math.PI;
        const r1=f.radius*0.3,r2=f.radius*0.85;
        ctx.beginPath();
        ctx.moveTo(f.x+Math.cos(ang)*r1,f.y+Math.sin(ang)*r1);
        ctx.lineTo(f.x+Math.cos(ang)*r2,f.y+Math.sin(ang)*r2);
        ctx.stroke();
      }
      ctx.restore();
    }
    // 穷奇维度裂隙：长条形空间裂缝(撕裂动画)
    if(f.dimensionRift&&a>0.05){
      ctx.save();
      ctx.translate(f.x,f.y);
      ctx.rotate(f.riftAngle);
      const halfLen=f.riftLength/2;
      const halfW=f.riftWidth/2;
      const t=Date.now()/200;
      // 渐入渐出：开始/结束时裂缝较短(撕裂/闭合动画)
      const lifePct=f.life/f.maxLife;
      const openFactor=lifePct>0.8?(1-lifePct)*5:(lifePct<0.2?lifePct*5:1);
      const curLen=halfLen*openFactor;
      // 裂缝核心：深紫色能量带(带渐变)
      const grad=ctx.createLinearGradient(-curLen,0,curLen,0);
      grad.addColorStop(0,'rgba(168,85,247,0)');
      grad.addColorStop(0.2,`rgba(192,132,252,${a*2})`);
      grad.addColorStop(0.5,`rgba(255,255,255,${a*3})`);
      grad.addColorStop(0.8,`rgba(192,132,252,${a*2})`);
      grad.addColorStop(1,'rgba(168,85,247,0)');
      ctx.fillStyle=grad;
      ctx.fillRect(-curLen,-halfW,curLen*2,halfW*2);
      // 裂缝边缘：发光紫色描边(锯齿状)
      ctx.strokeStyle=`rgba(216,180,254,${a*2.5})`;
      ctx.lineWidth=1.5;
      ctx.shadowColor='#a855f7'; ctx.shadowBlur=12;
      for(const side of [-1,1]){
        ctx.beginPath();
        for(let i=0;i<=20;i++){
          const px=-curLen+(i/20)*curLen*2;
          const py=side*halfW+Math.sin(t+i*0.7)*2;
          if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
      ctx.shadowBlur=0;
      // 裂缝中的能量火花(随机闪烁)
      for(let i=0;i<5;i++){
        const sx=(Math.random()-0.5)*curLen*1.8;
        const sy=(Math.random()-0.5)*halfW*1.5;
        ctx.fillStyle=`rgba(255,255,255,${a*3*Math.random()})`;
        ctx.fillRect(sx,sy,2,2);
      }
      ctx.restore();
    }
    // 饕餮黑洞：旋转漩涡环
    if(f.blackhole&&a>0.05){
      ctx.save();
      const t=Date.now()/400;
      for(let ring=0;ring<3;ring++){
        ctx.strokeStyle=`rgba(192,132,252,${a*(2-ring*0.4)})`;
        ctx.lineWidth=2-ring*0.5;
        ctx.beginPath();
        for(let i=0;i<=40;i++){
          const ang=i/40*Math.PI*2+t*(ring+1)*0.7;
          const r=f.radius*(0.3+ring*0.25)*(1+Math.sin(ang*3+t)*0.1);
          const px=f.x+Math.cos(ang)*r, py=f.y+Math.sin(ang)*r;
          if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
      ctx.fillStyle=`rgba(20,5,30,${a*3})`;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.radius*0.15,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    // 饕餮巨口：8个尖牙张合动画(只在devourMaw标记时显示)
    if(f.devourMaw&&a>0.05){
      ctx.save();
      const t=Date.now()/600;
      // 张合周期：2秒一周期(0~0.5张开, 0.5~1闭合)
      const openPhase=(Math.sin(t*Math.PI)+1)/2; // 0~1
      const mouthR=f.radius*0.25*(1+openPhase*0.6); // 张开时中心扩大
      ctx.fillStyle=`rgba(15,3,25,${a*4})`;
      ctx.beginPath(); ctx.arc(f.x,f.y,mouthR,0,Math.PI*2); ctx.fill();
      // 8个三角形尖牙围绕中心
      const teeth=8;
      for(let i=0;i<teeth;i++){
        const ang=i/teeth*Math.PI*2+t*0.3;
        const innerR=mouthR*0.7;
        const outerR=mouthR+12+openPhase*8;
        ctx.fillStyle=`rgba(240,230,255,${a*2.5})`;
        ctx.strokeStyle=`rgba(192,132,252,${a*1.5})`;
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(f.x+Math.cos(ang-0.1)*innerR, f.y+Math.sin(ang-0.1)*innerR);
        ctx.lineTo(f.x+Math.cos(ang)*outerR, f.y+Math.sin(ang)*outerR);
        ctx.lineTo(f.x+Math.cos(ang+0.1)*innerR, f.y+Math.sin(ang+0.1)*innerR);
        ctx.closePath(); ctx.fill(); ctx.stroke();
      }
      ctx.restore();
    }
    // 烛龙熔岩池：冒泡粒子
    if(f.lavaPool&&a>0.05){
      ctx.save();
      for(let i=0;i<3;i++){
        const ang=Date.now()/200+i*2.1;
        const r=f.radius*0.5*(0.5+Math.sin(ang*1.3)*0.5);
        const bx=f.x+Math.cos(ang)*r, by=f.y+Math.sin(ang)*r;
        ctx.fillStyle=`rgba(255,${150+Math.sin(ang*3)*50},0,${a*2})`;
        ctx.beginPath(); ctx.arc(bx,by,3+Math.sin(ang*2)*2,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
    // 干戚横扫特效：半月形挥砍轨迹（明显的刀光弧线）
    if(f.halberdSweepEffect&&a>0.02){
      ctx.save();
      const sweepT=1-lifeRatio; // 0→1 随时间推进
      const sweepAngle=sweepT*Math.PI*4; // 旋转2圈
      // 刀光主弧线（月牙形，跟随挥砍方向）
      ctx.translate(f.x,f.y);
      ctx.rotate(sweepAngle);
      ctx.shadowColor='#ff4500';ctx.shadowBlur=20;
      ctx.strokeStyle=`rgba(255,100,0,${a*1.2})`;
      ctx.lineWidth=12;
      ctx.beginPath();
      ctx.arc(0,0,f.radius*0.9,-Math.PI*0.35,Math.PI*0.35);
      ctx.stroke();
      // 内层亮光（白色锋芒）
      ctx.shadowBlur=15;
      ctx.strokeStyle=`rgba(255,255,200,${a*0.9})`;
      ctx.lineWidth=4;
      ctx.beginPath();
      ctx.arc(0,0,f.radius*0.9,-Math.PI*0.3,Math.PI*0.3);
      ctx.stroke();
      // 外层暗红光晕
      ctx.shadowColor='#8b0000';ctx.shadowBlur=25;
      ctx.strokeStyle=`rgba(139,0,0,${a*0.6})`;
      ctx.lineWidth=20;
      ctx.beginPath();
      ctx.arc(0,0,f.radius*0.9,-Math.PI*0.4,Math.PI*0.4);
      ctx.stroke();
      ctx.shadowBlur=0;
      ctx.restore();
    }
  }
}
function updateLightningStrikes(dt){
  for(const ls of lightningStrikes){
    ls.life-=dt;
    if(ls.life>0.3){
      // 伤害
      for(const e of enemies){if(!e.alive||ls.chained.has(e))continue;if(dist(ls.x,ls.y,e.x,e.y)<40){e.takeDamage(ls.dmg);ls.chained.add(e);}}
      if(boss&&boss.alive&&!ls.chained.has(boss)&&dist(ls.x,ls.y,boss.x,boss.y)<50){boss.takeDamage(ls.dmg);ls.chained.add(boss);}
      // 连锁
      if(ls.chain>0&&!ls.chainedDone){
        ls.chainedDone=true;
        let target=null,nd=ls.chainRange;
        for(const e of enemies){if(!e.alive||ls.chained.has(e))continue;const d=dist(ls.x,ls.y,e.x,e.y);if(d<nd){nd=d;target=e;}}
        if(target){lightningStrikes.push({x:target.x,y:target.y,life:0.4,dmg:ls.dmg*0.6,chain:ls.chain-1,chainRange:ls.chainRange,chained:new Set([...ls.chained,target])});}
      }
    }
  }
  lightningStrikes=lightningStrikes.filter(ls=>ls.life>0);
}
function drawLightningStrikes(){
  for(const ls of lightningStrikes){
    const a=Math.min(1,ls.life*2);
    ctx.strokeStyle=`rgba(255,215,0,${a})`; ctx.lineWidth=3; ctx.shadowColor='#ffd700'; ctx.shadowBlur=15;
    // 闪电形状
    ctx.beginPath(); ctx.moveTo(ls.x,ls.y-40);
    ctx.lineTo(ls.x-10,ls.y-15); ctx.lineTo(ls.x+5,ls.y-10);
    ctx.lineTo(ls.x-8,ls.y+10); ctx.lineTo(ls.x,ls.y+20);
    ctx.stroke(); ctx.shadowBlur=0;
    // 冲击波
    ctx.strokeStyle=`rgba(255,215,0,${a*0.5})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(ls.x,ls.y,40*(1-ls.life/0.5),0,Math.PI*2); ctx.stroke();
  }
}
function updateTornadoes(dt){
  for(const t of tornadoes){
    t.life-=dt; t.tick-=dt;
    t.x+=t.vx*dt; t.y+=t.vy*dt;
    t.x=clamp(t.x,t.radius,CONFIG.WIDTH-t.radius); t.y=clamp(t.y,t.radius,CONFIG.HEIGHT-t.radius);
    if(t.tick<=0){
      t.tick=0.2;
      for(const e of enemies){
        if(!e.alive)continue;
        const d=dist(t.x,t.y,e.x,e.y);
        if(d<t.radius){
          e.takeDamage(t.damage);
          // 吸引敌人
          const a=Math.atan2(t.y-e.y,t.x-e.x);
          e.x+=Math.cos(a)*30; e.y+=Math.sin(a)*30;
        }
      }
      if(boss&&boss.alive&&dist(t.x,t.y,boss.x,boss.y)<t.radius)boss.takeDamage(t.damage);
      // 伤害玩家（Boss召唤的龙卷风）
      if(player&&dist(t.x,t.y,player.x,player.y)<t.radius){
        player.takeDamage(1);
        // 推开玩家
        const pa=Math.atan2(player.y-t.y,player.x-t.x);
        player.x+=Math.cos(pa)*40; player.y+=Math.sin(pa)*40;
        spawnParticles(player.x,player.y,'#7fffd4',5);
      }
    }
  }
  tornadoes=tornadoes.filter(t=>t.life>0);
}
function drawTornadoes(){
  for(const t of tornadoes){
    const a=Math.min(1,t.life/Math.min(t.maxLife,5));
    ctx.save(); ctx.translate(t.x,t.y);
    for(let i=0;i<3;i++){
      const r=t.radius*(0.5+i*0.25);
      ctx.strokeStyle=`rgba(121,192,255,${a*0.4})`; ctx.lineWidth=3;
      ctx.beginPath();
      for(let j=0;j<20;j++){
        const ang=(j/20)*Math.PI*2+Date.now()/100+i;
        const px=Math.cos(ang)*r, py=Math.sin(ang)*r*0.7;
        if(j===0)ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.stroke();
    }
    ctx.restore();
  }
}
// ==================== 武器差异化命中效果 ====================
function triggerWeaponHitEffects(bullet,target){
  // 雷神炮：闪电链跳跃到附近敌人
  if(bullet.weaponId==='thunder'&&bullet.chainCount>0){
    bullet.chainCount--;
    let nearest=null,nd=180;
    for(const e of enemies){if(!e.alive||bullet.hitEnemies.has(e))continue;const d=dist(bullet.x,bullet.y,e.x,e.y);if(d<nd){nd=d;nearest=e;}}
    if(boss&&boss.alive&&!bullet.hitEnemies.has(boss)){const d=dist(bullet.x,bullet.y,boss.x,boss.y);if(d<nd*1.5)nearest=boss;}
    if(nearest){
      lightningStrikes.push({x:nearest.x,y:nearest.y,life:0.4,dmg:bullet.damage*0.5,chain:bullet.chainCount>0?1:0,chainRange:150,chained:new Set([target])});
      spawnParticles(bullet.x,bullet.y,'#ffe066',6);
    }
  }
  // 震天锤：命中时范围爆炸
  if(bullet.weaponId==='hammer'&&!bullet.hasExploded){
    bullet.hasExploded=true;
    const explodeR=55;
    for(const e of enemies){if(!e.alive||bullet.hitEnemies.has(e))continue;if(dist(bullet.x,bullet.y,e.x,e.y)<explodeR){e.takeDamage(bullet.damage*0.3,bullet);bullet.hitEnemies.add(e);}}
    if(boss&&boss.alive&&!bullet.hitEnemies.has(boss)&&dist(bullet.x,bullet.y,boss.x,boss.y)<explodeR){boss.takeDamage(bullet.damage*0.3,bullet);}
    spawnParticles(bullet.x,bullet.y,'#fb923c',18);
    // 爆炸冲击波视觉
    fireEffects.push({x:bullet.x,y:bullet.y,radius:explodeR,damage:0,life:0.8,maxLife:0.8,burnDmg:0,tick:0,chain:0,hammerBlast:true});
  }
  // 刑天干戚：战魂护盾 — 命中时叠加护盾(每命中3次+1护盾，每发子弹最多触发1次)
  if(bullet.weaponId==='xingtiangeqi'&&player&&!bullet._shieldAdded){
    player._xingtianHits=(player._xingtianHits||0)+1;
    if(player._xingtianHits>=3){
      // 每命中3次获得1点护盾（平衡：贴脸有所限制但仍可用）
      player._xingtianHits=0;
      player.shield=Math.min(player.shield+1,player.maxShield); // 不超过maxShield
      spawnParticles(player.x,player.y,'#ff4500',6);
      pushFloatingText(player.x,player.y-40,'战魂护盾+1','#ff4500',0.6);
      updateUI();
    }
    bullet._shieldAdded=true;
  }
}
// ==================== 碰撞检测 ====================
function checkCollisions(){
  for(const bullet of bullets){
    if(!bullet.alive)continue;
    for(const enemy of enemies){
      if(!enemy.alive||bullet.hitEnemies.has(enemy))continue;
      if(dist(bullet.x,bullet.y,enemy.x,enemy.y)<bullet.size+enemy.size*0.8){
        enemy.takeDamage(bullet.damage,bullet);
        bullet.hitEnemies.add(enemy);
        if(bullet.isCrit)pushFloatingText(enemy.x,enemy.y-15,'暴击!','#ff6b6b',0.6);
        // 吸血
        if(bullet.lifesteal&&Math.random()<bullet.lifesteal&&player){player.heal(1); spawnParticles(enemy.x,enemy.y,'#3fb950',3);}
        // 武器差异化机制
        triggerWeaponHitEffects(bullet,enemy);
        if(bullet.pierce>0)bullet.pierce--; else bullet.alive=false;
        break;
      }
    }
    if(bullet.alive&&boss&&boss.alive&&!bullet.hitEnemies.has(boss)){
      if(dist(bullet.x,bullet.y,boss.x,boss.y)<bullet.size+boss.size*1.5){
        const br=boss; boss.takeDamage(bullet.damage,bullet); bullet.hitEnemies.add(br);
        if(bullet.isCrit&&boss)pushFloatingText(br.x,br.y-30,'暴击!','#ff6b6b',0.6);
        // 吸血
        if(bullet.lifesteal&&Math.random()<bullet.lifesteal&&player){player.heal(1); spawnParticles(br.x,br.y,'#3fb950',3);}
        // 武器差异化机制
        triggerWeaponHitEffects(bullet,br);
        if(bullet.pierce>0)bullet.pierce--; else bullet.alive=false;
      }
    }
    // 玩家子弹可以击破刑天的战魂分身（追踪球）
    if(bullet.alive&&boss&&boss.alive&&boss.wrathClonesActive){
      for(const cl of boss.wrathClones){
        if(!cl.alive||bullet.hitEnemies.has(cl))continue;
        if(dist(bullet.x,bullet.y,cl.x,cl.y)<bullet.size+cl.size){
          cl.hp-=bullet.damage;
          cl.hitFlash=0.3;
          bullet.hitEnemies.add(cl);
          spawnParticles(cl.x,cl.y,'#bc8cff',8);
          if(bullet.isCrit)pushFloatingText(cl.x,cl.y-15,'暴击!','#ff6b6b',0.6);
          if(cl.hp<=0){
            cl.alive=false;
            spawnParticles(cl.x,cl.y,'#bc8cff',30);
            pushFloatingText(cl.x,cl.y-20,'战魂击破!','#ffd700',1.5);
            screenShake=0.2;
          }
          if(bullet.pierce>0)bullet.pierce--; else bullet.alive=false;
          break;
        }
      }
    }
  }
  const edmg=Math.max(1,Math.round(getDifficulty().enemyDmgMul));
  for(const enemy of enemies){if(!enemy.alive||!player)continue;if(dist(enemy.x,enemy.y,player.x,player.y)<enemy.size+player.size*0.7){player.takeDamage(edmg); if(player.thorns&&enemy.alive){enemy.takeDamage(player.thorns); spawnParticles(enemy.x,enemy.y,'#c0c0c0',5);}}}
  if(boss&&boss.alive&&player){if(dist(boss.x,boss.y,player.x,player.y)<boss.size*0.7+player.size*0.7)player.takeDamage(boss.isCharging?edmg+1:edmg);}
  // 宠物发射的追踪弹：伤害敌人和Boss，不伤害玩家
  for(const eb of enemyBullets){
    if(!eb.alive)continue;
    if(eb.fromPet){
      for(const enemy of enemies){
        if(!enemy.alive)continue;
        if(dist(eb.x,eb.y,enemy.x,enemy.y)<eb.size+enemy.size*0.8){
          enemy.takeDamage(eb.damage||5);
          spawnParticles(eb.x,eb.y,eb.color,8);
          eb.alive=false; break;
        }
      }
      if(eb.alive&&boss&&boss.alive&&dist(eb.x,eb.y,boss.x,boss.y)<eb.size+boss.size*1.5){
        boss.takeDamage(eb.damage||5);
        spawnParticles(eb.x,eb.y,eb.color,8);
        eb.alive=false;
      }
    }else if(player){
      // 普通敌方子弹：伤害玩家
      if(dist(eb.x,eb.y,player.x,player.y)<eb.size+player.size*0.6){
        if(eb.directHit){
          // 直接伤害（绕过无敌帧，战魂分身子弹等）
          applyDirectDamage(player,edmg+1,eb.directLabel||'⚔️直接命中!',eb.color);
        }else{
          player.takeDamage(edmg);
        }
        eb.alive=false;spawnParticles(eb.x,eb.y,eb.color,8);
      }
    }
  }
}

// ==================== 波次与关卡 ====================
function getWaveEnemyCount(wave){return Math.ceil((5+wave*3+Math.floor(wave/2)*2)*getDifficulty().enemyCountMul);}
function getWaveEnemyTypes(wave){
  const t=['grunt']; if(wave>=2)t.push('runner'); if(wave>=3)t.push('tank','spiky'); if(wave>=4)t.push('shooter','invincible'); if(wave>=5)t.push('giant','bomber');
  if(wave>=7)t.push('taunt');
  // 弑神难度额外加入分裂怪
  if(saveData.difficulty==='godslayer'&&wave>=4)t.push('splitter');
  return t;
}
function spawnWaveEnemy(){
  const wave=currentWave+(currentLevel-1)*5;
  const types=getWaveEnemyTypes(wave);
  const w={grunt:35,runner:20,spiky:12,tank:10,shooter:8,giant:3,invincible:7,bomber:8,taunt:4,splitter:5};
  const avail=types.filter(t=>w[t]); if(avail.length===0)return; let tw=avail.reduce((s,t)=>s+w[t],0); let r=Math.random()*tw; let sel=avail[0];
  for(const t of avail){r-=w[t];if(r<=0){sel=t;break;}}
  const waveBonus=currentWave-1+(currentLevel-1)*5;
  const e=new Enemy(sel,waveBonus);
  // 无尽模式：怪物按无尽波次增强（每波HP+15%、速度+2%）
  if(endlessMode&&endlessWave>0){
    const em=1+endlessWave*0.15; const sm=1+endlessWave*0.02;
    e.maxHealth=Math.ceil(e.maxHealth*em); e.health=e.maxHealth;
    e.speed*=sm; e.baseSpeed*=sm;
    e._endlessBuff=true;
  }
  enemies.push(e);
}
function startWave(){
  gameState='fighting';
  let te=getWaveEnemyCount(currentWave+(currentLevel-1)*5);
  // 无尽模式：每波多2只怪
  if(endlessMode&&endlessWave>0){te+=endlessWave*2;}
  enemiesToSpawn=te; enemiesRemaining=te; spawnTimer=0.5;
  maxLevelTime=CONFIG.LEVEL_TIME; levelTimer=maxLevelTime;
  updateUI();
}
function checkWaveComplete(){
  if(gameState!=='fighting')return;
  if(enemiesRemaining<=0&&enemiesToSpawn<=0&&enemies.every(e=>!e.alive)){
    if(currentWave>=CONFIG.WAVES_PER_LEVEL)startBoss();
    else showUpgradeScreen();
  }
}
function startBoss(){
  gameState='boss'; enemies=[]; enemyBullets=[]; minions=[];
  bossWarnings=[]; boss=new Boss(currentLevel);
  // Boss变异：10%概率遇到变异Boss，技能组合不同，掉落更好
  if(!endlessMode&&Math.random()<0.10){

// 应用Boss变异：血量+50%，攻速+30%，借用其他Boss的技能
function applyBossVariant(b){
  b.isVariant=true;
  b.maxHealth=Math.ceil(b.maxHealth*1.5); b.health=b.maxHealth;
  b.speed*=1.3;
  // 借用其他Boss的special技能（混搭）
  const otherBosses=BOSS_TYPES.filter(x=>x.idx!==b.bossIndex&&!x.isSuper);
  if(otherBosses.length>0){
    const stolen=otherBosses[Math.floor(Math.random()*otherBosses.length)];
    b._variantSpecial=stolen.special;
    b._variantSpecial2=stolen.special2;
    b._variantName=stolen.name;
  }
  // 变异光晕颜色
  b.color='#ff00ff';
}

  // 随机打乱4个普通Boss顺序，最后追加2个超级Boss
  trialBossOrder=shuffle([0,1,2,3,6,7]);
  trialBossOrder.push(4,5,8);

  if(saveData.selectedPet!==null&&saveData.ownedPets[saveData.selectedPet]){

// 生成试炼Boss
function spawnTrialBoss(){
  gameState='boss'; enemies=[]; enemyBullets=[];
  bossWarnings=[];
  const idx=trialBossOrder[bossTrialIndex]??0;
  if(idx<4||idx===6||idx===7){
    boss=new Boss(currentLevel,false);
    boss.bossIndex=idx; boss.bossType=BOSS_TYPES[idx];
    boss.name=boss.bossType.name; boss.color=boss.bossType.color;
  }else{
    // 超级Boss
    boss=new Boss(currentLevel,true,idx);
  }
  // 试炼Boss血量按难度额外加成（弑神可达4倍）
  const trialMul=getDifficulty().bossTrialHpMul;
  if(trialMul&&trialMul>1){
    boss.maxHealth=Math.ceil(boss.maxHealth*trialMul);
    boss.health=boss.maxHealth;
  }
  // 试炼Boss随波次增强攻速
  boss._trialIndex=bossTrialIndex;
  bossHealthBar.classList.remove('hidden'); bossName.style.color=''; bossName.textContent=`试炼 ${bossTrialIndex+1}/${trialBossOrder.length} - ${boss.name}`;
  updateBossUI(); showWaveAnnounce('Boss试炼！',`${boss.name} 出现了！`,true);
  maxLevelTime=CONFIG.BOSS_TIME*1.5; levelTimer=maxLevelTime;
}
function onBossDefeated(defeatedBoss){
  // 刑天被击败后：若之前从试炼触发，继续试炼流程
  if(defeatedBoss&&defeatedBoss.isFinalBoss&&resumeTrialAfterFinalBoss){
    resumeTrialAfterFinalBoss=false;
    // 试炼模式：刑天结束后继续下一个试炼Boss
    bossTrialIndex++;
    if(bossTrialIndex<trialBossOrder.length){
      setTimeout(()=>{if(gameState!=='boss')return;spawnTrialBoss();},2000);
    }else{
      bossTrialMode=false; gameOver();
    }
    return;
  }
  // 时间挑战结算：在Boss击败时立即判定
  if(bossTimeChallenge&&bossTimeChallenge.active){
    const elapsed=bossTimeChallenge.maxTime-bossTimeChallenge.time;
    if(elapsed<=30){
      // 30秒内击杀：额外500分
      score+=500;
      pushFloatingText(player.x,player.y-50,'⚡ 时间挑战! +500','#ffd700',2);
      showWaveAnnounce('⚡ 时间挑战达成！','+500分奖励！',true);
    }else if(elapsed<=50){
      // 50秒内击杀：额外200分
      score+=200;
      pushFloatingText(player.x,player.y-50,'⚡ 时间挑战! +200','#f0883e',2);
    }
    bossTimeChallenge.active=false;
  }
  // 变异Boss额外奖励：+300分
  if(defeatedBoss&&defeatedBoss.isVariant){
    score+=300;
    pushFloatingText(defeatedBoss.x,defeatedBoss.y-60,'🔥 变异奖励! +300','#ff00ff',2);
  }
  // 无尽模式：无尽Boss被击败后直接进入下一波（不走普通关卡流程，不触发超级复仇）
  if(endlessMode&&defeatedBoss&&defeatedBoss._endlessWave){
    // 玩家恢复一些生命与护盾作为奖励
    if(player){
      const heal=Math.ceil(player.maxHealth*0.15);
      player.health=Math.min(player.maxHealth,player.health+heal);
      if(player.shieldRegen)player.shield=Math.min(player.shield+player.shieldRegen,player.maxShield);
      pushFloatingText(player.x,player.y-30,`+${heal} HP`,'#3fb950',1.5);
    }
    // 标记：选完强化后由 applyUpgrade 直接进入下一波无尽
    pendingEndlessNext=true;
    showUpgradeScreen();
    return;
  }
  // Boss试炼模式
  if(bossTrialMode){
    // 超级Boss复仇被击败：不增加索引，继续下一个试炼Boss
    if(defeatedBoss&&defeatedBoss.isSuper&&pendingSuperRevenge){
      pendingSuperRevenge=false;
      if(bossTrialIndex<trialBossOrder.length){
        setTimeout(()=>{if(gameState!=='boss')return;spawnTrialBoss();},1500);
      }else{
        bossTrialMode=false;gameOver();
      }
      return;
    }
    bossTrialIndex++;
    if(bossTrialIndex<trialBossOrder.length){
      // 30%几率超级Boss复仇（在试炼中）
      if(!defeatedBoss.isSuper&&Math.random()<0.3){
        pendingSuperRevenge=true;
        setTimeout(()=>{
          if(gameState!=='boss')return;
          spawnSuperBoss();
        },1500);
        return;
      }
      setTimeout(()=>{
        if(gameState!=='boss')return;
        spawnTrialBoss();
      },1500);
      return;
    }else{
      // 试炼结束，进入结算
      bossTrialMode=false;
      gameOver();
      return;
    }
  }
  // 超级Boss复仇：复仇Boss被击败后正常进入升级
  if(defeatedBoss&&defeatedBoss.isSuper&&pendingSuperRevenge){
    pendingSuperRevenge=false;
    showUpgradeScreen();
    return;
  }
  // 弑神难度：双Boss，第一个死后立即出现第二个
  if(godslayerBossesLeft>0){
    godslayerBossesLeft--;
    setTimeout(()=>{
      if(gameState!=='boss')return;
      gameState='boss'; enemies=[]; enemyBullets=[];
      bossWarnings=[]; boss=new Boss(currentLevel,false);
      // 第二个Boss用不同类型（6个普通Boss循环）
      const normalBosses2=[0,1,2,3,6,7];
      boss.bossIndex=normalBosses2[(((currentLevel-1)+1)%normalBosses2.length)]; boss.bossType=BOSS_TYPES[boss.bossIndex];
      boss.name=boss.bossType.name; boss.color=boss.bossType.color;
      bossHealthBar.classList.remove('hidden'); bossName.style.color=''; bossName.textContent=`BOSS2 - ${boss.name}`;
      updateBossUI(); showWaveAnnounce('第二只Boss！',`${boss.name} 出现了！`,true);
      maxLevelTime=CONFIG.BOSS_TIME; levelTimer=maxLevelTime;
    },1500);
    return;
  }
  // 普通Boss被击败后，30%几率超级Boss复仇
  if(defeatedBoss&&!defeatedBoss.isSuper&&Math.random()<0.3){
    pendingSuperRevenge=true;
    setTimeout(()=>{
      if(gameState!=='boss')return;
      spawnSuperBoss();
    },1500);
    return;
  }
  // 正常进入升级
  showUpgradeScreen();
}

function applyUpgrade(up){
  if(!player)return;

  // 无尽模式Boss击败后选完强化：直接进入下一波无尽（不走普通关卡流程）
  if(endlessMode&&pendingEndlessNext){
    pendingEndlessNext=false;
    pushFloatingText(player.x,player.y-30,up.name+'!',up.rarity==='legendary'?'#ffd700':up.rarity==='epic'?'#f0883e':up.rarity==='rare'?'#bc8cff':'#58a6ff',1.5);
    enterEndlessWave();
    return;
  }
  currentWave++;
  pushFloatingText(player.x,player.y-30,up.name+'!',up.rarity==='legendary'?'#ffd700':up.rarity==='epic'?'#f0883e':up.rarity==='rare'?'#bc8cff':'#58a6ff',1.5);
  if(currentWave>CONFIG.WAVES_PER_LEVEL){
    currentLevel++; currentWave=1;

    if(endlessMode&&currentLevel>8){enterEndlessWave();return;}
    showWaveAnnounce(`第 ${currentLevel} 关`,'新的挑战开始！',false);
    const regen=player.regenPerLevel||0; if(regen>0)player.health=Math.min(player.health+regen,player.maxHealth);
    // 护盾再生：每关恢复护盾
    if(player.shieldRegen){player.shield=Math.min(player.shield+player.shieldRegen,player.maxShield);}
    enemies=[];enemyBullets=[];bullets=[];drops=[];minions=[];fireEffects=[];lightningStrikes=[];tornadoes=[];
    setTimeout(()=>{if(gameState!=='upgrade'&&gameState!=='wavePrepare')return;startWave();},2000);
  }else{
    showWaveAnnounce(`第 ${currentWave} 波`,'准备战斗！');
    setTimeout(()=>{if(gameState!=='upgrade'&&gameState!=='wavePrepare')return;startWave();},1500);
  }
  updateUI();
}

  endlessWave++;

    setTimeout(()=>{if(gameState!=='upgrade'&&gameState!=='wavePrepare')return;startEndlessBoss();},2000);

      if(player.shieldRegen){player.shield=Math.min(player.shield+player.shieldRegen,player.maxShield);}

}

// ==================== 背景绘制 ====================
function drawBackground(){
  // 屏幕震动效果
  ctx.save();
  if(screenShake>0){
    ctx.translate(rand(-screenShake*10,screenShake*10),rand(-screenShake*10,screenShake*10));
    // 触发手机振动（仅在大震动时，避免过度反馈）
    if(screenShake > 0.5 && !window._lastVibrate){
      window._lastVibrate = true;
      vibrate(30);
      setTimeout(()=>{ window._lastVibrate = false; }, 200);
    }
    screenShake-=0.016;
    if(screenShake<0)screenShake=0;
  }
  ctx.fillStyle='#161b22'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
  // 网格
  ctx.strokeStyle='rgba(48,54,61,0.3)'; ctx.lineWidth=1;
  for(let x=0;x<CONFIG.WIDTH;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CONFIG.HEIGHT);ctx.stroke();}
  for(let y=0;y<CONFIG.HEIGHT;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CONFIG.WIDTH,y);ctx.stroke();}
  // 边界
  ctx.strokeStyle='#30363d'; ctx.lineWidth=3;
  ctx.strokeRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
  ctx.restore();
  // 屏幕闪光效果
  if(screenFlash&&screenFlash.life>0){
    const a=screenFlash.life/screenFlash.maxLife;
    const c=screenFlash.color;
    const cr=parseInt(c.substr(1,2),16),cg=parseInt(c.substr(3,2),16),cb=parseInt(c.substr(5,2),16);
    ctx.fillStyle=`rgba(${cr},${cg},${cb},${a*0.4})`;
    ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
    screenFlash.life-=0.016;
    if(screenFlash.life<=0)screenFlash=null;
  }
}
function flashScreen(color,duration){
  screenFlash={color,life:duration,maxLife:duration};
}
function drawWarnings(){
  // 更新计时器（所有警告按timer/time过期）
  for(const w of bossWarnings){if(w.timer!==undefined)w.timer-=0.016;if(w.time!==undefined)w.time-=0.016;}
  // 过滤：所有计时器归零的警告都移除（boss关联的也按timer过期，避免stale预警残留）
  bossWarnings=bossWarnings.filter(w=>(w.timer===undefined||w.timer>0)&&(w.time===undefined||w.time>0));
  for(const w of bossWarnings){
    const prog=1-(w.time!==undefined?w.time:w.timer!==undefined?w.timer:0)/((w.maxTime!==undefined?w.maxTime:w.maxTimer!==undefined?w.maxTimer:1));
    const a=0.2+prog*0.5;
    const pulse=0.6+Math.sin(Date.now()*0.012)*0.3;
    const wc=w.color||'rgba(248,81,73';
    ctx.fillStyle=`${wc},${a*0.3})`; ctx.strokeStyle=`${wc},${a*pulse})`; ctx.lineWidth=3;
    // 通用：为所有圆形预警添加内层渐变光晕
    const drawWarnCircle=(x,y,r)=>{
      const grad=ctx.createRadialGradient(x,y,0,x,y,r);
      grad.addColorStop(0,`${wc},${a*0.5})`);
      grad.addColorStop(0.6,`${wc},${a*0.2})`);
      grad.addColorStop(1,`${wc},0)`);
      ctx.fillStyle=grad;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      // 旋转虚线外圈
      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(Date.now()*0.004);
      ctx.strokeStyle=`${wc},${a*pulse})`;
      ctx.setLineDash([12,6]);
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      // 倒计时内圈
      if(prog<0.9){
        ctx.strokeStyle=`${wc},${a*0.6})`;
        ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(x,y,r*(1-prog),0,Math.PI*2); ctx.stroke();
      }
    };
    if(w.type==='special2'&&w.data){
      const d=w.data;
      if(d.beamType==='horizontal'){
        ctx.fillRect(0,d.y-50,CONFIG.WIDTH,100);
        ctx.strokeRect(0,d.y-50,CONFIG.WIDTH,100);
        if(prog>0.7){ctx.fillStyle=`${wc},${a*0.5})`;ctx.fillRect(0,d.y-50,CONFIG.WIDTH,100);}
      }else if(d.beamType==='vertical'){
        ctx.fillRect(d.x-50,0,100,CONFIG.HEIGHT);
        ctx.strokeRect(d.x-50,0,100,CONFIG.HEIGHT);
        if(prog>0.7){ctx.fillStyle=`${wc},${a*0.5})`;ctx.fillRect(d.x-50,0,100,CONFIG.HEIGHT);}
      }else if(d.beamType==='fan'){
        for(const ang of d.angles){
          ctx.beginPath();
          ctx.moveTo(d.x,d.y);
          ctx.arc(d.x,d.y,600,ang-0.15,ang+0.15);
          ctx.closePath(); ctx.fill(); ctx.stroke();
        }
      }else if(d.beamType==='zone'){
        ctx.beginPath(); ctx.arc(d.x,d.y,d.radius,0,Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(d.x,d.y,d.radius*0.3,0,Math.PI*2); ctx.stroke();
      }else if(d.beamType==='concentric'){
        // 计蒙洪水波纹预警：3个同心圆
        for(let i=0;i<3;i++){
          const r=d.radius?d.radius*(0.3+i*0.3):100*(i+1);
          ctx.beginPath(); ctx.arc(d.x,d.y,r,0,Math.PI*2); ctx.stroke();
        }
        ctx.beginPath(); ctx.arc(d.x,d.y,30,0,Math.PI*2); ctx.fill();
      }else if(d.positions){
        for(const p of d.positions){
          if(p.horizontal!==undefined&&p.length){
            // 穷奇虚空裂缝：长条形预警
            const w=p.horizontal?p.length:40;
            const h=p.horizontal?40:p.length;
            ctx.fillRect(p.x-w/2,p.y-h/2,w,h);
            ctx.strokeRect(p.x-w/2,p.y-h/2,w,h);
          }else{
            ctx.beginPath();ctx.arc(p.x,p.y,p.radius||60,0,Math.PI*2);ctx.fill();ctx.stroke();
          }
        }
      }
    }else if(w.type==='charge'&&w.data){
      const a2=w.data.angle;
      ctx.beginPath(); ctx.moveTo(w.data.startX,w.data.startY);
      ctx.lineTo(w.data.startX+Math.cos(a2)*500,w.data.startY+Math.sin(a2)*500);
      ctx.lineTo(w.data.startX+Math.cos(a2+0.1)*500,w.data.startY+Math.sin(a2+0.1)*500);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }else if(w.type==='eyeBeam'&&w.data){
      drawWarnCircle(w.data.x,w.data.y,w.data.radius);
    }else if(w.type==='meteor'&&w.data&&w.data.positions){
      for(const p of w.data.positions){drawWarnCircle(p.x,p.y,p.radius||60);}
    }else if(w.type==='teleport'&&w.boss){
      // 为Boss特殊攻击画范围预警圆
      drawWarnCircle(w.boss.x,w.boss.y,300);
    }else if(w.x!==undefined&&w.y!==undefined&&w.radius){
      // 直接给坐标和半径的预警圆（lavaFist落点等）
      drawWarnCircle(w.x,w.y,w.radius);
    }else if(w.type==='teleport'){
      ctx.strokeStyle=`rgba(63,185,80,${a})`; ctx.lineWidth=4;
      ctx.strokeRect(2,2,CONFIG.WIDTH-4,CONFIG.HEIGHT-4);
    }
  }
  // 绘制安全区全屏攻击预警（绿色=安全区，红屏=危险区）
  if(boss&&boss.alive&&boss.safeZoneActive&&boss.safeZoneData){
    const d=boss.safeZoneData;
    const prog=1-d.timer/d.maxTimer; // 0→1
    // 全屏红色危险覆盖（越接近触发越深）
    ctx.fillStyle=`rgba(248,81,73,${0.15+prog*0.25})`;
    ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
    // 安全区绿色圆（挖洞效果）
    ctx.save();
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.radius,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
    // 安全区边框：绿色脉冲圈
    const pulse=0.7+Math.sin(Date.now()*0.01)*0.3;
    ctx.strokeStyle=`rgba(63,185,80,${pulse})`;
    ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(d.x,d.y,d.radius,0,Math.PI*2); ctx.stroke();
    // 内圈虚线
    ctx.strokeStyle=`rgba(63,185,80,${pulse*0.5})`;
    ctx.lineWidth=2;
    ctx.setLineDash([10,8]);
    ctx.beginPath(); ctx.arc(d.x,d.y,d.radius*0.7,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // 倒计时数字
    const secLeft=Math.ceil(d.timer);
    ctx.fillStyle=`rgba(63,185,80,${0.8+prog*0.2})`;
    ctx.font='bold 32px STKaiti,KaiTi,serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(secLeft+'s',d.x,d.y);
    // 接近触发时闪烁
    if(prog>0.7){
      ctx.fillStyle=`rgba(248,81,73,${(prog-0.7)*1.5})`;
      ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
    }
  }
  // ===== 刑天最终Boss技能预警 =====
  if(boss&&boss.alive&&boss.isFinalBoss){
    // 干戚横扫预警（旋转红色光圈+干戚图标）
    if(boss.halberdSweepActive&&boss.halberdSweepData){
      const d=boss.halberdSweepData;
      const prog=1-d.timer/d.maxTimer;
      const pulse=0.5+Math.sin(Date.now()*0.018)*0.3;
      // 外圈：旋转的虚线
      ctx.save();
      ctx.translate(boss.x,boss.y);
      ctx.rotate(Date.now()*0.003);
      ctx.strokeStyle=`rgba(139,0,0,${pulse+prog*0.3})`;
      ctx.lineWidth=5;
      ctx.setLineDash([20,10]);
      ctx.beginPath(); ctx.arc(0,0,d.radius,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      // 内圈填充（渐变红）
      const grad=ctx.createRadialGradient(boss.x,boss.y,0,boss.x,boss.y,d.radius);
      grad.addColorStop(0,`rgba(139,0,0,${0.02+prog*0.08})`);
      grad.addColorStop(0.7,`rgba(255,69,0,${0.05+prog*0.15})`);
      grad.addColorStop(1,`rgba(139,0,0,${0.1+prog*0.2})`);
      ctx.fillStyle=grad;
      ctx.beginPath(); ctx.arc(boss.x,boss.y,d.radius,0,Math.PI*2); ctx.fill();
      // 旋转的干戚图标（3个方向）
      const iconAngle=Date.now()*0.005;
      for(let i=0;i<3;i++){
        const a=iconAngle+(i/3)*Math.PI*2;
        const ix=boss.x+Math.cos(a)*d.radius;
        const iy=boss.y+Math.sin(a)*d.radius;
        ctx.save();
        ctx.translate(ix,iy);
        ctx.rotate(a+Math.PI/2);
        ctx.fillStyle=`rgba(255,69,0,${0.8+prog*0.2})`;
        ctx.font='bold 28px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('⚔️',0,0);
        ctx.restore();
      }
      // 倒计时数字
      ctx.fillStyle=`rgba(255,215,0,${0.9})`;
      ctx.font='bold 32px STKaiti,KaiTi,serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(Math.ceil(d.timer),boss.x,boss.y-d.radius-25);
    }
    // 天崩地裂预警（裂纹图案+脉动）
    if(boss.earthCrackActive&&boss.earthCrackData){
      const d=boss.earthCrackData;
      const prog=1-d.timer/d.maxTimer;
      for(const c of d.cracks){
        const pulse=0.5+Math.sin(Date.now()*0.012+c.angle)*0.3;
        // 外圈虚线
        ctx.strokeStyle=`rgba(255,69,0,${pulse+prog*0.4})`;
        ctx.lineWidth=4;
        ctx.setLineDash([14,7]);
        ctx.beginPath(); ctx.arc(c.x,c.y,c.radius,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
        // 内部填充
        const grad=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.radius);
        grad.addColorStop(0,`rgba(255,200,0,${0.15+prog*0.2})`);
        grad.addColorStop(1,`rgba(139,0,0,${0.05+prog*0.1})`);
        ctx.fillStyle=grad;
        ctx.beginPath(); ctx.arc(c.x,c.y,c.radius,0,Math.PI*2); ctx.fill();
        // 裂纹线
        ctx.strokeStyle=`rgba(255,69,0,${0.4+prog*0.4})`;
        ctx.lineWidth=2;
        for(let i=0;i<5;i++){
          const a=c.angle+(i/5)*Math.PI*2;
          ctx.beginPath();
          ctx.moveTo(c.x,c.y);
          ctx.lineTo(c.x+Math.cos(a)*c.radius,c.y+Math.sin(a)*c.radius);
          ctx.stroke();
        }
      }
    }
    // 战魂分身（紫色战魂，程序化绘制确保可见，带血量条）
    if(boss.wrathClonesActive){
      for(const cl of boss.wrathClones){
        if(!cl.alive)continue;
        cl.wobble+=0.03;
        if(cl.spawnTime>0)cl.spawnTime-=0.016;
        const spawnAlpha=cl.spawnTime>0?(0.5-cl.spawnTime)/0.5:1;
        ctx.save();
        ctx.globalAlpha=cl.alpha*spawnAlpha;
        ctx.translate(cl.x,cl.y);
        const ct=Date.now()/200+cl.wobble;
        // 受击白色闪光
        if(cl.hitFlash>0){
          ctx.shadowColor='#ffffff';ctx.shadowBlur=30;
        }
        // 外层紫色光晕
        ctx.shadowColor=cl.hitFlash>0?'#ffffff':'#bc8cff'; ctx.shadowBlur=25;
        const auraPulse=0.5+Math.sin(ct*2)*0.5;
        ctx.strokeStyle=`rgba(188,140,255,${0.6+auraPulse*0.3})`;ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(0,0,cl.size*1.3,0,Math.PI*2);ctx.stroke();
        ctx.shadowBlur=0;
        // 主体：紫色战魂球（渐变）
        const cGrad=ctx.createRadialGradient(0,-cl.size*0.3,0,0,0,cl.size*0.9);
        cGrad.addColorStop(0,cl.hitFlash>0?'rgba(255,255,255,0.95)':'rgba(216,180,254,0.9)');
        cGrad.addColorStop(0.5,'rgba(188,140,255,0.7)');
        cGrad.addColorStop(1,'rgba(88,28,135,0.4)');
        ctx.fillStyle=cGrad;
        ctx.beginPath();ctx.arc(0,0,cl.size*0.95,0,Math.PI*2);ctx.fill();
        // 中心战魂之眼（金色发光）
        const eyePulse=0.7+Math.sin(ct*4)*0.3;
        ctx.shadowColor='#ffd700';ctx.shadowBlur=10*eyePulse;
        ctx.fillStyle=`rgba(255,215,0,${0.9})`;
        ctx.beginPath();ctx.arc(0,-cl.size*0.15,cl.size*0.14,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
        ctx.fillStyle='#1a0505';
        ctx.beginPath();ctx.arc(0,-cl.size*0.15,cl.size*0.06,0,Math.PI*2);ctx.fill();
        // 环绕能量粒子
        for(let i=0;i<6;i++){
          const a=ct*2+i*Math.PI/3;
          const r=cl.size*1.05+Math.sin(ct*3+i)*4;
          ctx.fillStyle=`rgba(216,180,254,${0.7+auraPulse*0.3})`;
          ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,3,0,Math.PI*2);ctx.fill();
        }
        ctx.restore();
        // 血量条（在分身上方）
        if(cl.hp<cl.maxHp){
          const barW=cl.size*1.6, barH=5;
          const bx=cl.x-barW/2, by=cl.y-cl.size*1.4;
          ctx.fillStyle='rgba(0,0,0,0.6)';
          ctx.fillRect(bx-1,by-1,barW+2,barH+2);
          ctx.fillStyle='#bc8cff';
          ctx.fillRect(bx,by,barW*(cl.hp/cl.maxHp),barH);
        }
      }
    }
  }
  // 绘制Boss活跃光波/引力井（实际效果）
  if(boss&&boss.alive){
    if(boss._beamActive&&boss._beamData){
      const d=boss._beamData; const t=d.timer/d.duration;
      ctx.globalAlpha=Math.max(0.3,1-t*0.5);
      const c=boss.color;
      const cr=parseInt(c.substr(1,2),16),cg=parseInt(c.substr(3,2),16),cb=parseInt(c.substr(5,2),16);
      if(d.beamType==='horizontal'){
        const grd=ctx.createLinearGradient(0,d.y-50,0,d.y+50);
        grd.addColorStop(0,`rgba(${cr},${cg},${cb},0)`);grd.addColorStop(0.5,`rgba(${cr},${cg},${cb},0.8)`);grd.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
        ctx.fillStyle=grd; ctx.fillRect(0,d.y-50,CONFIG.WIDTH,100);
      }else if(d.beamType==='vertical'){
        const grd=ctx.createLinearGradient(d.x-50,0,d.x+50,0);
        grd.addColorStop(0,`rgba(${cr},${cg},${cb},0)`);grd.addColorStop(0.5,`rgba(${cr},${cg},${cb},0.8)`);grd.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
        ctx.fillStyle=grd; ctx.fillRect(d.x-50,0,100,CONFIG.HEIGHT);
      }else if(d.beamType==='fan'){
        for(const ang of d.angles){
          const grd=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,600);
          grd.addColorStop(0,`rgba(${cr},${cg},${cb},0.9)`);grd.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
          ctx.fillStyle=grd;
          ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.arc(d.x,d.y,600,ang-0.15,ang+0.15); ctx.closePath(); ctx.fill();
        }
      }
      ctx.globalAlpha=1;
    }
    if(boss._wellActive&&boss._wellData){
      const d=boss._wellData; const t=d.timer/d.duration;
      const c=boss.color;
      const cr=parseInt(c.substr(1,2),16),cg=parseInt(c.substr(3,2),16),cb=parseInt(c.substr(5,2),16);
      ctx.save(); ctx.translate(d.x,d.y);
      // 1. 中心深紫核心光晕（强）
      const coreGrad=ctx.createRadialGradient(0,0,0,0,0,40);
      coreGrad.addColorStop(0,`rgba(${cr},${cg},${cb},0.9)`);
      coreGrad.addColorStop(0.5,`rgba(75,0,130,0.7)`);
      coreGrad.addColorStop(1,`rgba(75,0,130,0)`);
      ctx.fillStyle=coreGrad;
      ctx.beginPath(); ctx.arc(0,0,40,0,Math.PI*2); ctx.fill();
      // 2. 范围填充（半透明深紫）
      const fillGrad=ctx.createRadialGradient(0,0,0,0,0,d.radius);
      fillGrad.addColorStop(0,`rgba(${cr},${cg},${cb},${0.3+t*0.2})`);
      fillGrad.addColorStop(0.5,`rgba(75,0,130,${0.2+t*0.15})`);
      fillGrad.addColorStop(1,`rgba(75,0,130,0)`);
      ctx.fillStyle=fillGrad;
      ctx.beginPath(); ctx.arc(0,0,d.radius,0,Math.PI*2); ctx.fill();
      // 3. 多重旋转弧线（加强）
      ctx.globalAlpha=0.8+t*0.2;
      for(let i=0;i<4;i++){
        ctx.save();
        ctx.rotate(Date.now()/200+i*Math.PI/2);
        ctx.strokeStyle=`rgba(${cr},${cg},${cb},0.9)`;
        ctx.lineWidth=4;
        ctx.shadowColor=`rgba(${cr},${cg},${cb},0.8)`; ctx.shadowBlur=12;
        ctx.beginPath(); ctx.arc(0,0,d.radius*(0.4+i*0.18),0,Math.PI*1.3); ctx.stroke();
        ctx.restore();
      }
      ctx.shadowBlur=0;
      // 4. 边缘脉冲圆环
      const pulseR=d.radius*(0.9+Math.sin(Date.now()/150)*0.05);
      ctx.strokeStyle=`rgba(${cr},${cg},${cb},${0.7+t*0.3})`;
      ctx.lineWidth=5;
      ctx.beginPath(); ctx.arc(0,0,pulseR,0,Math.PI*2); ctx.stroke();
      // 5. 内部漩涡粒子
      ctx.fillStyle=`rgba(216,180,254,0.9)`;
      for(let i=0;i<8;i++){
        const ang=Date.now()/400+i*Math.PI/4;
        const r=d.radius*0.3*(1+Math.sin(Date.now()/300+i)*0.3);
        ctx.beginPath(); ctx.arc(Math.cos(ang)*r,Math.sin(ang)*r,3,0,Math.PI*2); ctx.fill();
      }
      ctx.restore(); ctx.globalAlpha=1;
    }
    // 计蒙洪水波纹绘制
    if(boss._floodActive&&boss._floodData){
      const d=boss._floodData;
      const c=boss.color;
      const cr=parseInt(c.substr(1,2),16),cg=parseInt(c.substr(3,2),16),cb=parseInt(c.substr(5,2),16);
      ctx.save();
      for(const w of d.waves){
        if(d.timer>=w.timer&&w.r>0){
          const fade=1-Math.min(1,w.r/w.maxR);
          ctx.strokeStyle=`rgba(${cr},${cg},${cb},${0.7*fade})`;
          ctx.lineWidth=6;
          ctx.beginPath();ctx.arc(d.x,d.y,w.r,0,Math.PI*2);ctx.stroke();
          // 内层水色填充
          ctx.fillStyle=`rgba(${cr},${cg},${cb},${0.15*fade})`;
          ctx.beginPath();ctx.arc(d.x,d.y,w.r,0,Math.PI*2);ctx.fill();
        }
      }
      ctx.restore();
    }
  }
}

// ==================== 游戏状态管理 ====================
function startGame(){
  initAudio(); // 首次开始游戏时初始化音频
  gameState='wavePrepare'; score=0; gameTime=0; currentWave=1; currentLevel=1;
  enemiesRemaining=0; enemiesToSpawn=0; spawnTimer=0; boss=null; bossWarnings=[];
  globalSlow=1; globalSlowTimer=0; bossHpMul=1; revivesUsed=0;
  comboCount=0; comboTimer=0; comboMax=0; // 重置连击
  bossTrialMode=false; bossTrialIndex=0; pendingSuperRevenge=false; godslayerBossesLeft=0;
  adventureEnemyTimer=15;
  endlessMode=false; endlessWave=0; activeRelics=[]; bossTimeChallenge=null; bossVariant=false; pendingEndlessNext=false;
  pendingFinalBoss=false; // 重置刑天触发标记
  resumeTrialAfterFinalBoss=false;
  bullets=[]; enemies=[]; enemyBullets=[]; particles=[]; floatingTexts=[]; drops=[]; minions=[];
  fireEffects=[]; lightningStrikes=[]; tornadoes=[]; pets=[];
  player=new Player();
  // 加载宠物
  if(saveData.selectedPet!==null&&saveData.ownedPets[saveData.selectedPet]){
    const pd=saveData.ownedPets[saveData.selectedPet]; const def=getPetDef(pd.def);
    if(def){const pet=new Pet(def,pd.stage); pets.push(pet);}
  }
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('bossHealthBar').classList.add('hidden');
  document.getElementById('upgradeOverlay').classList.add('hidden');
  showWaveAnnounce(`第 ${currentWave} 波`,'准备战斗！');
  setTimeout(()=>{if(gameState!=='upgrade'&&gameState!=='wavePrepare')return;startWave();},1500); updateUI();
}
// 无尽模式：通关8关后进入无尽波次
function startEndlessMode(){
  // 先正常开始游戏，通关后自动进入无尽
  startGame();
  // startGame会重置endlessMode，所以这里再设置回来
  endlessMode=true; endlessWave=0; activeRelics=[]; pendingEndlessNext=false;
  showWaveAnnounce('♾️ 无尽模式','通关后将进入无尽挑战！');
}
// ==================== Roguelike遗物系统 ====================
function showRelicSelection(){
  if(!player)return;
  gameState='upgrade';
  // 过滤已拥有的遗物
  const available=RELIC_DEFS.filter(r=>!activeRelics.find(a=>a.id===r.id));
  if(available.length===0){
    showWaveAnnounce('遗物已满','所有遗物都已获得！');
    setTimeout(()=>{if(gameState!=='upgrade'&&gameState!=='wavePrepare')return;startWave();},1500);
    return;
  }
  const sel=shuffle(available).slice(0,Math.min(3,available.length));
  const ov=document.getElementById('relicOverlay');
  let html='<h2 style="color:#bc8cff">✨ 遗物选择</h2><div class="deco-line"><span>本局有效 · 与永久装备区分</span></div><div class="upgrade-cards">';
  for(const r of sel){
    html+=`<div class="relic-card ${r.rarity} card-enter" data-relic="${r.id}" style="animation-delay:${sel.indexOf(r)*0.1}s"><div class="relic-icon">${r.icon}</div><div class="upgrade-name" style="color:${r.rarity==='epic'?'#f0883e':'#bc8cff'}">${r.name}</div><div class="upgrade-desc">${r.desc}</div><div class="upgrade-rarity ${r.rarity}">${r.rarity==='rare'?'稀有':'史诗'}</div></div>`;
  }

// 死亡动画：玩家炸开效果
let deathAnimation=null; // {x,y,t,maxT,particles:[]}
function triggerDeathAnimation(){
  if(deathAnimation)return; // 防止重复触发
  playSound('death');
  const px=player.x, py=player.y;
  // 生成爆炸粒子
  const particles=[];
  for(let i=0;i<40;i++){
    const a=(i/40)*Math.PI*2+Math.random()*0.3;
    const sp=80+Math.random()*200;
    particles.push({x:px,y:py,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.8+Math.random()*0.4,maxLife:1.2,size:3+Math.random()*5,color:Math.random()<0.5?'#ffd700':(Math.random()<0.5?'#f85149':'#ff8c00')});
  }
  // 大爆炸环
  for(let i=0;i<20;i++){
    const a=(i/20)*Math.PI*2;
    particles.push({x:px,y:py,vx:Math.cos(a)*300,vy:Math.sin(a)*300,life:0.5,maxLife:0.5,size:8,color:'#fff8e0'});
  }
  deathAnimation={x:px,y:py,t:0,maxT:1.5,particles};
  // 隐藏玩家
  if(player)player.alive=false;
  // 1.2秒后触发gameOver
  setTimeout(()=>{deathAnimation=null; gameOver();},1200);
}
function updateDeathAnimation(dt){
  if(!deathAnimation)return;
  deathAnimation.t+=dt;
  for(const p of deathAnimation.particles){
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=0.92; p.vy*=0.92;
    p.life-=dt;
  }
}
function drawDeathAnimation(){
  if(!deathAnimation)return;
  const da=deathAnimation;
  const progress=da.t/da.maxT;
  // 中心闪光
  if(progress<0.3){
    const flashR=100*(progress/0.3);
    const grad=ctx.createRadialGradient(da.x,da.y,0,da.x,da.y,flashR);
    grad.addColorStop(0,`rgba(255,255,255,${1-progress/0.3})`);
    grad.addColorStop(0.5,`rgba(255,200,50,${0.6*(1-progress/0.3)})`);
    grad.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(da.x,da.y,flashR,0,Math.PI*2); ctx.fill();
  }
  // 爆炸环
  if(progress<0.5){
    const ringR=120*progress;
    ctx.strokeStyle=`rgba(255,217,112,${1-progress*2})`; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(da.x,da.y,ringR,0,Math.PI*2); ctx.stroke();
  }
  // 粒子
  for(const p of da.particles){
    if(p.life<=0)continue;
    const a=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.globalAlpha=a;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// 牧场生蛋（每局游戏结束后调用）
function ranchLayEggs(){
  if(!saveData.ranchPets||saveData.ranchPets.length===0)return 0;
  if(saveData.eggs.length>=5)return 0; // 蛋最多5个
  let count=0;
  // 一局只出一个蛋
  let epicChance=0.3;
  for(const p of saveData.ranchPets){
    const def=getPetDef(p.def);
    if(def&&def.isSuper)epicChance+=0.1;
  }
  const isEpic=Math.random()<epicChance;
  let defIdx;
  if(isEpic){
    defIdx=Math.random()<0.5?4:5;
  }else{
    defIdx=randInt(0,3);
  }
  saveData.eggs.push({type:isEpic?'epic':'normal',def:defIdx});
  count++;
  saveSave();
  return count;
}
// 孵化蛋
function hatchEgg(idx){
  const egg=saveData.eggs[idx]; if(!egg)return;
  const def=getPetDef(egg.def);
  saveData.ownedPets.push({def:egg.def,stage:0});
  saveData.eggs.splice(idx,1);
  saveSave();
  // 显示孵化结果提示
  const name=def?def.name:'未知宠物';
  const icon=def?def.icon:'🐾';
  const rarity=egg.type==='epic'?'史诗':'普通';
  const color=egg.type==='epic'?'#bc8cff':'#3fb950';
  showToast(`🥚 孵化成功！获得${rarity}宠物 ${icon} ${name}！`,color,3000);
}
// 放入牧场
function putPetInRanch(ownedIdx){
  if(saveData.ranchPets.length>=3)return false;
  const p=saveData.ownedPets[ownedIdx]; if(!p)return false;
  saveData.ranchPets.push({def:p.def,stage:p.stage});
  // 从拥有列表移除（如果正选中此宠物则取消选择）
  if(saveData.selectedPet===ownedIdx)saveData.selectedPet=null;
  else if(saveData.selectedPet!==null&&saveData.selectedPet>ownedIdx)saveData.selectedPet--;
  saveData.ownedPets.splice(ownedIdx,1);
  saveSave();
  return true;
}

}

// 初始化牧场场景
function initRanchScene(canvas){
  stopRanchScene(); // 停止旧的
  const ctx=canvas.getContext('2d');
  const w=canvas.width, h=canvas.height;
  // 从saveData构建宠物实体
  const pets=saveData.ranchPets.map((p,i)=>{
    const def=getPetDef(p.def);
    return {
      def:p.def, stage:p.stage, name:def?def.name:'?', isSuper:def?def.isSuper:false, icon:def?def.icon:'?',
      x: 60+Math.random()*(w-120), y: 60+Math.random()*(h-120),
      tx: 0, ty: 0, // 目标
      speed: 38+Math.random()*10, // 徘徊速度较慢
      state:'wander', wanderTimer: Math.random()*2, bobPhase: Math.random()*Math.PI*2,
      size: 18+p.stage*4, eatFlash:0,
    };
  });
  ranchScene={canvas,ctx,w,h,pets,chickens:[],rafId:null,lastTime:0,running:true,clickTarget:null,clickPulse:0,grassPhase:0};
  canvas.onclick=(e)=>{
    const rect=canvas.getBoundingClientRect();
    const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    const cx=(e.clientX-rect.left)*sx, cy=(e.clientY-rect.top)*sy;
    ranchScene.clickTarget={x:cx,y:cy}; ranchScene.clickPulse=1;
    // 所有宠物移动到点击位置（散开一点）
    ranchScene.pets.forEach((pet,i)=>{
      const ang=(i/ranchScene.pets.length)*Math.PI*2;
      pet.tx=cx+Math.cos(ang)*20; pet.ty=cy+Math.sin(ang)*20;
      pet.state='moveTo';
    });
  };
  ranchLoop(performance.now());
}
// 同步牧场宠物（放入/取回后调用）
function syncRanchPets(){
  if(!ranchScene||!ranchScene.running)return;
  const w=ranchScene.w, h=ranchScene.h;
  // 保留现有宠物的位置，新增的宠物加在随机位置
  const existingKeys=ranchScene.pets.map(p=>p.def+'_'+p.stage);
  const newPets=[];
  saveData.ranchPets.forEach(p=>{
    const def=getPetDef(p.def);
    newPets.push({def:p.def, stage:p.stage, name:def?def.name:'?', isSuper:def?def.isSuper:false, icon:def?def.icon:'?'});
  });
  // 重建pets数组，尽量保留位置
  ranchScene.pets=newPets.map((np,i)=>{
    const old=ranchScene.pets[i];
    if(old&&old.def===np.def&&old.stage===np.stage){
      return old; // 保留位置和状态
    }
    return {
      ...np, x:60+Math.random()*(w-120), y:60+Math.random()*(h-120), tx:0, ty:0,
      speed:38+Math.random()*10, state:'wander', wanderTimer:Math.random()*2, bobPhase:Math.random()*Math.PI*2,
      size:18+np.stage*4, eatFlash:0,
    };
  });
}

// 停止牧场场景
function stopRanchScene(){

    ranchScene=null;
