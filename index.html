  /* 古风云纹背景装饰 */
  body::before {

    background:
      radial-gradient(circle at 15% 20%, rgba(212,160,23,0.06) 0%, transparent 25%),

      0 0 0 4px rgba(212,160,23,0.15),
      0 0 60px rgba(165,40,56,0.18),
      0 20px 80px rgba(0,0,0,0.7);

    height: min(calc(100vw / 1.6), 100vh);
    max-width: 1600px;
    max-height: 1000px;

  /* 四角云纹装饰 */
  #gameContainer::before, #gameContainer::after {

  .rarity-common { color: #b0a090; } .rarity-rare { color: #58a6ff; } .rarity-epic { color: #bc8cff; } .rarity-legendary { color: #ffd970; }
  .section-title { font-size: 17px; color: #ffd970; margin: 12px 0 8px; text-align: left; width: 100%; max-width: 600px; font-weight: bold; letter-spacing: 1.5px; }
  .info-text { font-size: 13px; color: #b0a090; line-height: 1.7; max-width: 600px; margin-bottom: 14px; }
  .capture-btn { padding: 12px 32px; font-size: 16px; border-radius: 22px; cursor: pointer; margin: 6px; border: none; font-weight: bold; letter-spacing: 1px; transition: all 0.2s; }
  .capture-yes { background: linear-gradient(135deg, #d4a017, #a52838); color: #fff8e0; box-shadow: 0 4px 14px rgba(165,40,56,0.4); }
  .capture-yes:hover { transform: scale(1.05); box-shadow: 0 8px 22px rgba(212,160,23,0.5); }
  .capture-no { background: linear-gradient(135deg, #2a3142, #1a1f2e); color: #e6c8a0; border: 1px solid rgba(212,160,23,0.4); }
  .capture-no:hover { transform: scale(1.05); border-color: #ffd970; }
  .pet-slot { display: inline-block; background: linear-gradient(135deg, #2a3142, #1a1f2e); border: 1px solid rgba(212,160,23,0.3); border-radius: 8px; padding: 6px 11px; margin: 3px; font-size: 13px; }
  .scroll-container { padding: 4px; }
  .scroll-container::-webkit-scrollbar { width: 8px; }
  .scroll-container::-webkit-scrollbar-track { background: #0d1117; border-radius: 4px; }
  .scroll-container::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #d4a017, #a52838); border-radius: 4px; }
  /* 动画 keyframes */
  @keyframes titleFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes legendaryPulse { 0%,100% { box-shadow: 0 0 22px rgba(255,215,0,0.35), inset 0 1px 0 rgba(255,255,255,0.1); } 50% { box-shadow: 0 0 36px rgba(255,215,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15); } }
  @keyframes menuFrameGlow { 0%,100% { box-shadow: 0 0 0 1px rgba(212,160,23,0.3), 0 0 40px rgba(165,40,56,0.15); } 50% { box-shadow: 0 0 0 1px rgba(212,160,23,0.5), 0 0 60px rgba(165,40,56,0.25); } }
  /* === 新增动画与视觉样式 === */
  @keyframes floatRune { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.4; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 12px rgba(212,160,23,0.3); } 50% { box-shadow: 0 0 28px rgba(212,160,23,0.6); } }
  @keyframes rotateBorder { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
  @keyframes badgeBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes barShimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes ringExpand { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

  /* 背景飘浮符文 */
  .bg-runes { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .bg-rune { position: absolute; font-size: 26px; opacity: 0.12; animation: floatRune 14s linear infinite; text-shadow: 0 0 10px rgba(212,160,23,0.4); font-family: 'STKaiti', 'KaiTi', serif; color: #d4a017; }
  .bg-rune:nth-child(1) { left: 8%; animation-delay: 0s; animation-duration: 16s; }
  .bg-rune:nth-child(2) { left: 22%; animation-delay: 3s; animation-duration: 18s; font-size: 28px; }
  .bg-rune:nth-child(3) { left: 38%; animation-delay: 6s; animation-duration: 14s; }
  .bg-rune:nth-child(4) { left: 55%; animation-delay: 9s; animation-duration: 20s; font-size: 26px; }
  .bg-rune:nth-child(5) { left: 72%; animation-delay: 2s; animation-duration: 15s; }
  .bg-rune:nth-child(6) { left: 88%; animation-delay: 7s; animation-duration: 17s; font-size: 24px; }
  .bg-rune:nth-child(7) { left: 15%; animation-delay: 11s; animation-duration: 19s; }
  .bg-rune:nth-child(8) { left: 65%; animation-delay: 5s; animation-duration: 13s; font-size: 30px; }

  /* 标题闪光 */
  .title-shimmer {
    color: #ffd970 !important;
    -webkit-text-fill-color: #ffd970 !important;
    background: none !important;
    text-shadow: 0 0 10px rgba(255,217,112,0.6), 0 0 20px rgba(212,160,23,0.4), 0 2px 4px rgba(0,0,0,0.8);
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer { 0%,100% { text-shadow: 0 0 10px rgba(255,217,112,0.6), 0 0 20px rgba(212,160,23,0.4), 0 2px 4px rgba(0,0,0,0.8); } 50% { text-shadow: 0 0 18px rgba(255,217,112,0.9), 0 0 32px rgba(212,160,23,0.7), 0 2px 4px rgba(0,0,0,0.8); } }
  /* 副标题装饰线 */
  .deco-line { display: flex; align-items: center; gap: 12px; justify-content: center; margin: 10px 0; }
  .deco-line::before, .deco-line::after { content: ''; height: 1px; flex: 1; max-width: 120px; background: linear-gradient(90deg, transparent, rgba(212,160,23,0.6), transparent); }
  .deco-line span { color: #d4a017; font-size: 12px; letter-spacing: 3px; }

  /* === 山海经主菜单美化 === */
  .sj-title-wrap { position: relative; display: inline-block; padding: 10px 60px; margin: 0 auto; }
  .sj-title-wrap::before, .sj-title-wrap::after {
    content: ''; position: absolute; top: 50%; width: 40px; height: 40px;

  .sj-title-wrap::before { left: 0; border-right: none; border-radius: 8px 0 0 8px; }
  .sj-title-wrap::after { right: 0; border-left: none; border-radius: 0 8px 8px 0; }
  .sj-title-seal {
    display: inline-block; padding: 3px 12px; margin: 4px auto 0;
    background: linear-gradient(135deg, #a52838, #c84048);
    color: #fff8e0; font-size: 13px; letter-spacing: 6px; font-weight: bold;

    font-family: 'STKaiti', 'KaiTi', serif;
  }
  /* 烛龙头像框 - 华丽版 */
  .sj-boss-showcase {
    position: relative; width: 120px; height: 120px; margin: 4px auto 8px;
    border-radius: 50%; overflow: visible;
  }
  .sj-boss-showcase .sj-avatar-inner {
    position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
    border: 3px solid rgba(255,217,112,0.85);

  }
  .sj-boss-showcase .sj-avatar-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .sj-boss-showcase .sj-boss-label {

  .sj-boss-showcase .sj-boss-orbit {

  }
  .sj-boss-showcase .sj-boss-orbit2 {
    position: absolute; inset: -22px; border: 1px dotted rgba(212,160,23,0.3);
    border-radius: 50%; animation: rotateBorder 40s linear infinite reverse;
  }
  /* 头像四角符印 */
  .sj-boss-showcase .sj-corner-seal {
    position: absolute; width: 14px; height: 14px; border: 1.5px solid rgba(255,217,112,0.7);
    background: radial-gradient(circle, rgba(212,160,23,0.4), transparent);
  }
  .sj-boss-showcase .sj-corner-seal.tl { top: -8px; left: -8px; border-right: none; border-bottom: none; }
  .sj-boss-showcase .sj-corner-seal.tr { top: -8px; right: -8px; border-left: none; border-bottom: none; }
  .sj-boss-showcase .sj-corner-seal.bl { bottom: -8px; left: -8px; border-right: none; border-top: none; }
  .sj-boss-showcase .sj-corner-seal.br { bottom: -8px; right: -8px; border-left: none; border-top: none; }
  .sj-cloud-deco {
    position: absolute; pointer-events: none; opacity: 0.12;
    font-size: 80px; color: #d4a017; z-index: 0;
    font-family: 'STKaiti', 'KaiTi', serif;
  }
  .sj-cloud-deco.tl { top: 10px; left: 20px; transform: rotate(-15deg); }
  .sj-cloud-deco.br { bottom: 10px; right: 20px; transform: rotate(15deg); }
  .sj-scroll-frame {
    background: linear-gradient(180deg, rgba(26,20,10,0.85), rgba(15,10,5,0.92));
    border: 1px solid rgba(212,160,23,0.4);
    border-radius: 14px; padding: 16px 20px; margin: 8px auto;

  }
  .sj-scroll-frame::before { left: 6px; }
  .sj-scroll-frame::after { right: 6px; }
  .sj-ancient-btn {
    background: linear-gradient(180deg, rgba(60,40,15,0.9) 0%, rgba(30,20,8,0.95) 100%);
    border: 1px solid rgba(212,160,23,0.5);

  }
  .sj-ancient-btn:hover {
    border-color: #ffd970; color: #ffd970;
    box-shadow: 0 0 20px rgba(212,160,23,0.5), inset 0 1px 0 rgba(255,217,112,0.25);
    transform: translateY(-2px);
  }
  .sj-ancient-btn .sj-btn-icon { font-size: 20px; margin-right: 6px; vertical-align: middle; }

  /* 统计胶囊 */
  .stat-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; background: rgba(22,27,34,0.7); border: 1px solid rgba(212,160,23,0.3); backdrop-filter: blur(8px); animation: pulseGlow 3s ease-in-out infinite; }
  .stat-pill .pill-icon { font-size: 16px; }
  .stat-pill .pill-value { font-size: 17px; font-weight: bold; color: #ffd970; }
  .stat-pill .pill-label { font-size: 11px; color: #8b949e; }

  /* 按钮分类区 */
  .menu-section { margin: 10px 0; animation: slideUp 0.4s ease-out backwards; }
  .menu-section:nth-child(1) { animation-delay: 0.05s; }
  .menu-section:nth-child(2) { animation-delay: 0.15s; }
  .menu-section:nth-child(3) { animation-delay: 0.25s; }
  .menu-section-title { font-size: 11px; color: #8b949e; letter-spacing: 3px; margin-bottom: 6px; text-transform: uppercase; }
  .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(95px, 1fr)); gap: 6px; max-width: 540px; margin: 0 auto; }
  .feature-btn {
    background: linear-gradient(180deg, rgba(36,30,18,0.92) 0%, rgba(18,14,8,0.95) 100%);
    border: 1px solid rgba(212,160,23,0.4); border-radius: 12px; padding: 10px 6px; cursor: pointer;
    transition: all 0.28s cubic-bezier(0.4,0,0.2,1); pointer-events: auto; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    box-shadow: inset 0 1px 0 rgba(255,217,112,0.12), 0 4px 14px rgba(0,0,0,0.45);
    position: relative; overflow: hidden;
  }
  .feature-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,217,112,0.18), transparent); transition: left 0.5s; }
  .feature-btn::after { content: ''; position: absolute; inset: 0; border-radius: 14px; padding: 1px; background: linear-gradient(180deg, rgba(255,217,112,0.4), transparent); -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .feature-btn:hover::before { left: 100%; }
  .feature-btn:hover::after { opacity: 1; }
  .feature-btn:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 14px 30px rgba(212,160,23,0.4), inset 0 1px 0 rgba(255,217,112,0.2); }
  .feature-btn:active { transform: translateY(-2px) scale(1.01); }
  .feature-btn .fb-icon { font-size: 24px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6)); transition: transform 0.3s; }
  .feature-btn:hover .fb-icon { transform: scale(1.15) rotate(-4deg); }
  .feature-btn .fb-name { font-size: 12px; color: #ffe9b8; font-weight: 700; letter-spacing: 1px; font-family: 'STKaiti','KaiTi',serif; }
  .feature-btn .fb-tag { font-size: 8px; color: #a89070; letter-spacing: 0.5px; }
  /* 功能按钮主题色 */
  .feature-btn.fb-gold { border-color: rgba(255,217,112,0.55); }
  .feature-btn.fb-gold:hover { box-shadow: 0 14px 30px rgba(255,217,112,0.45), inset 0 1px 0 rgba(255,217,112,0.2); border-color: #ffd970; }
  .feature-btn.fb-purple { border-color: rgba(168,85,247,0.5); background: linear-gradient(180deg, rgba(38,22,52,0.92) 0%, rgba(18,12,28,0.95) 100%); }
  .feature-btn.fb-purple:hover { box-shadow: 0 14px 30px rgba(168,85,247,0.4), inset 0 1px 0 rgba(188,140,255,0.2); border-color: #bc8cff; }
  .feature-btn.fb-purple .fb-name { color: #e0c8ff; }
  .feature-btn.fb-green { border-color: rgba(63,185,80,0.5); background: linear-gradient(180deg, rgba(18,36,28,0.92) 0%, rgba(8,18,14,0.95) 100%); }
  .feature-btn.fb-green:hover { box-shadow: 0 14px 30px rgba(63,185,80,0.4), inset 0 1px 0 rgba(63,185,80,0.2); border-color: #3fb950; }
  .feature-btn.fb-green .fb-name { color: #b8f0c0; }
  .feature-btn.fb-blue { border-color: rgba(88,166,255,0.5); background: linear-gradient(180deg, rgba(18,28,48,0.92) 0%, rgba(8,14,24,0.95) 100%); }
  .feature-btn.fb-blue:hover { box-shadow: 0 14px 30px rgba(88,166,255,0.4), inset 0 1px 0 rgba(88,166,255,0.2); border-color: #58a6ff; }
  .feature-btn.fb-blue .fb-name { color: #c8e0ff; }
  .feature-btn.fb-red { border-color: rgba(248,81,73,0.5); background: linear-gradient(180deg, rgba(48,18,18,0.92) 0%, rgba(24,8,8,0.95) 100%); }
  .feature-btn.fb-red:hover { box-shadow: 0 14px 30px rgba(248,81,73,0.4), inset 0 1px 0 rgba(248,81,73,0.2); border-color: #f85149; }
  .feature-btn.fb-red .fb-name { color: #ffc8c0; }
  .feature-btn.fb-cyan { border-color: rgba(74,155,142,0.5); background: linear-gradient(180deg, rgba(14,36,36,0.92) 0%, rgba(6,18,18,0.95) 100%); }
  .feature-btn.fb-cyan:hover { box-shadow: 0 14px 30px rgba(74,155,142,0.4), inset 0 1px 0 rgba(74,155,142,0.2); border-color: #4a9b8e; }
  .feature-btn.fb-cyan .fb-name { color: #b8e8e0; }

  /* 主行动按钮（强化） */
  .action-btn {
    background: linear-gradient(135deg, #d4a017 0%, #a52838 100%); color: #fff8e0;
    border: none; padding: 12px 36px; font-size: 15px; font-weight: bold; letter-spacing: 2px;
    border-radius: 26px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    pointer-events: auto; margin: 3px; position: relative; overflow: hidden;
    box-shadow: 0 6px 20px rgba(165,40,56,0.45), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -2px 0 rgba(0,0,0,0.2);
  }
  .action-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: left 0.6s; }
  .action-btn:hover::before { left: 100%; }
  .action-btn:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 10px 32px rgba(212,160,23,0.6), 0 0 50px rgba(165,40,56,0.4); }
  .action-btn:active { transform: scale(1.02); }
  .action-btn.trial { background: linear-gradient(135deg, #7a3fb0 0%, #bc8cff 100%); box-shadow: 0 6px 20px rgba(122,63,176,0.45), inset 0 1px 0 rgba(255,255,255,0.3); }
  .action-btn.endless { background: linear-gradient(135deg, #daa520 0%, #ff6347 100%); box-shadow: 0 6px 20px rgba(218,165,32,0.45), inset 0 1px 0 rgba(255,255,255,0.3); }

  /* 难度选择胶囊 */
  .diff-pills { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .diff-pill {
    padding: 7px 16px; border-radius: 20px; cursor: pointer; transition: all 0.25s;
    background: rgba(22,27,34,0.8); border: 1.5px solid rgba(139,148,158,0.35);
    font-size: 12px; color: #c9d1d9; pointer-events: auto; backdrop-filter: blur(6px);
    display: inline-flex; align-items: center; gap: 4px; font-weight: 600;
  }
  .diff-pill:hover { transform: translateY(-2px); border-color: rgba(255,217,112,0.6); color: #ffd970; }
  .diff-pill.active { border-width: 2px; background: rgba(40,30,15,0.85); box-shadow: 0 0 16px currentColor; animation: pulseGlow 2.5s ease-in-out infinite; }

  /* 装备卡片增强 */
  .gear-card { background: linear-gradient(180deg, rgba(26,31,46,0.95) 0%, rgba(13,17,23,0.95) 100%); border: 2px solid #30363d; border-radius: 12px; padding: 12px; margin: 6px 0; transition: all 0.25s; position: relative; overflow: hidden; }
  .gear-card.common { border-color: #4a5568; } .gear-card.rare { border-color: #58a6ff; box-shadow: 0 0 12px rgba(88,166,255,0.15); }
  .gear-card.epic { border-color: #bc8cff; box-shadow: 0 0 14px rgba(188,140,255,0.2); } .gear-card.legendary { border-color: #ffd970; box-shadow: 0 0 18px rgba(255,215,0,0.3); animation: legendaryPulse 2.5s ease-in-out infinite; }
  .gear-card.mythic { border-color: #ff6347; box-shadow: 0 0 22px rgba(255,99,71,0.4); animation: legendaryPulse 2s ease-in-out infinite; }

  /* 浮动徽章 */
  .float-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; animation: badgeBounce 2s ease-in-out infinite; }

  /* 进度条闪光 */
  .bar-shimmer { position: relative; overflow: hidden; }
  .bar-shimmer::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%); background-size: 200% 100%; animation: barShimmer 2.5s linear infinite; }

  /* 遗物卡片 */
  .relic-card { background: linear-gradient(180deg, rgba(40,30,60,0.95) 0%, rgba(20,15,35,0.95) 100%); border: 2px solid rgba(188,140,255,0.5); border-radius: 14px; padding: 18px 14px; cursor: pointer; transition: all 0.3s; pointer-events: auto; display: flex; flex-direction: column; align-items: center; width: 180px; box-shadow: 0 0 20px rgba(188,140,255,0.2), inset 0 1px 0 rgba(255,255,255,0.06); position: relative; overflow: hidden; }
  .relic-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(188,140,255,0.18), transparent); transition: left 0.6s; }
  .relic-card:hover::before { left: 100%; }
  .relic-card:hover { border-color: #ffd970; transform: translateY(-6px) scale(1.02); box-shadow: 0 14px 32px rgba(188,140,255,0.35); }
  .relic-card.epic { border-color: #f0883e; box-shadow: 0 0 22px rgba(240,136,62,0.3); }
  .relic-icon { font-size: 36px; margin-bottom: 6px; filter: drop-shadow(0 0 10px rgba(188,140,255,0.5)); }

  /* 通用卡片入场 */

<script>
// ==================== 工具函数 ====================
// Fisher-Yates 洗牌算法，保证均匀随机分布
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ==================== 存档系统 ====================
let saveData = {
  totalScore: 0, talentPoints: 0, talents: {},
  currentCharacter: 'default', unlockedCharacters: ['default'],
  ownedWeapons: { pistol: 1 }, currentWeapon: 'pistol',
  weaponCrafts: {},
  ownedPets: [], selectedPet: null,
  bonusClicks: 3,        // +800分按钮剩余次数
  difficulty: 'normal',  // normal/hard/hell/godslayer
  ranchPets: [],         // 牧场中的宠物索引列表
  eggs: [],              // 蛋列表 {type:'normal'|'epic', def:bossIdx}
  // 装备系统
  equippedGear: { helmet:null, armor:null, boots:null, ring:null }, // 装备的装备槽
  gearBag: [],           // 装备背包（未装备的装备）
  // Boss图鉴与成就
  bossPedia: {},         // {bossIdx: {killed:true, killCount:n}}
  achievements: {},      // {achId: {unlocked:true, progress:n}}
  achievementFlags: { totalKills:0, totalBossKills:0, totalRuns:0, totalScore:0 }, // 成就追踪标志
  // 新系统
  bestEndlessWave: 0,    // 无尽模式最佳波次
  // 角色皮肤系统
  ownedSkins: [],        // 已拥有的皮肤ID列表
  equippedSkins: {},     // {characterId: skinId} 每个角色佩戴的皮肤
  // 魂器系统
  ownedArtifacts: [],    // 已获得的魂器bossIdx列表
  equippedArtifact: null, // 当前装备的魂器bossIdx
  hasShanHaiBook: false, // 是否拥有山海故事书
};

function loadSave() {
  try {
    const s = localStorage.getItem('pixelShooterSave_v2');
    if (s) {
      const d = JSON.parse(s);
      saveData = { ...saveData, ...d };
    }
    // 迁移：删除已废弃的喷火枪，补偿等价积分
    if(saveData.ownedWeapons && saveData.ownedWeapons.flamethrower){
      const stage=saveData.ownedWeapons.flamethrower;
      delete saveData.ownedWeapons.flamethrower;
      delete saveData.weaponCrafts.flamethrower;
      if(saveData.currentWeapon==='flamethrower')saveData.currentWeapon='pistol';
      saveData.totalScore=(saveData.totalScore||0)+stage*300; // 补偿
    }
    // 确保新字段存在
    if(!saveData.ownedSkins)saveData.ownedSkins=[];
    if(!saveData.equippedSkins)saveData.equippedSkins={};
    if(!saveData.ownedArtifacts)saveData.ownedArtifacts=[];
    if(saveData.equippedArtifact===undefined)saveData.equippedArtifact=null;
  } catch(e) {}
}
function saveSave() { try { localStorage.setItem('pixelShooterSave_v2', JSON.stringify(saveData)); } catch(e) {} }

// ==================== 配置 ====================
const CONFIG = {
  WIDTH: 1600, HEIGHT: 1000,
  PLAYER: { SIZE: 20, SPEED: 240, MAX_HEALTH: 6, FIRE_COOLDOWN: 0.22, INVINCIBLE_TIME: 1.2, BULLET_SPEED: 520, BULLET_DAMAGE: 1, BULLET_SIZE: 5 },
  WAVES_PER_LEVEL: 5,
  LEVEL_TIME: 30, BOSS_TIME: 50,
  ENEMY_TYPES: {
    grunt:     { size: 16, speed: 70,  health: 2, score: 6,  color: '#7fb069', shape: 'blob',     tier: 1 },  // 小妖：绿色史莱姆
    runner:    { size: 13, speed: 130, health: 2, score: 9,  color: '#9d7fd1', shape: 'imp',      tier: 1 },  // 魍魉：紫色小鬼
    tank:      { size: 24, speed: 45,  health: 6, score: 18, color: '#8a8a8a', shape: 'golem',    tier: 2 },  // 石灵：灰色石头人
    shooter:   { size: 18, speed: 55,  health: 3, score: 15, color: '#c4a8ff', shape: 'shaman',   tier: 2, shoots: true, shootCooldown: 2.2 }, // 巫祝
    giant:     { size: 32, speed: 35,  health: 12,score: 38, color: '#a52838', shape: 'oni',      tier: 3 },  // 巨灵：红色鬼

function upgradeTalent(id){
  const t=TALENTS.find(t=>t.id===id); if(!t)return false;
  const lv=getTalentLevel(id); if(lv>=t.maxLevel)return false;
  if(saveData.talentPoints<t.costPerLevel)return false;
  saveData.talentPoints-=t.costPerLevel; saveData.talents[id]=lv+1; saveSave(); return true;
}

  let c=0; for(const t of TALENTS){ c+=getTalentLevel(t.id)*t.costPerLevel; }

}

function getAvailableUpgrades(){
  if(!player)return BASE_UPGRADES;
  const ups=BASE_UPGRADES.filter(u=>{
    // 唯一升级：已拥有则不再出现
    if(u.unique){
      if(u.id==='berserk'&&player.berserk)return false;
      if(u.id==='quickfoot'&&player.quickfoot)return false;
      if(u.id==='doubletap'&&player.doubleTap)return false;
    }
    return true;
  });
  // 元素子弹
  for(const[eid,el]of Object.entries(ELEMENT_UPGRADES)){
    const ct=player.elementTiers?.[eid]||0;
    if(ct<el.tiers.length){
      const tier=el.tiers[ct];
      ups.push({id:`${eid}_t${ct+1}`,name:`${el.name} Lv.${ct+1}`,icon:el.icon,desc:tier.desc,rarity:ct===2?'epic':'rare',element:eid,tier:ct+1,apply:p=>{if(!p.elementTiers)p.elementTiers={};p.elementTiers[eid]=ct+1;if(!p.elementEffects)p.elementEffects={};p.elementEffects[eid]=tier.effect;}});
    }else if(!player.finalUpgrades?.includes(eid)){
      ups.push({id:`${eid}_final`,name:el.finalUpgrade.name,icon:el.icon,desc:el.finalUpgrade.desc,rarity:'legendary',isFinal:true,element:eid,apply:p=>{if(!p.finalUpgrades)p.finalUpgrades=[];p.finalUpgrades.push(eid);}});
    }
  }
  // 特殊技能
  for(const[aid,ab]of Object.entries(SPECIAL_ABILITIES)){
    const ct=player.specialTiers?.[aid]||0;
    if(ct<ab.tiers.length){
      const tier=ab.tiers[ct];
      ups.push({id:`${aid}_t${ct+1}`,name:`${ab.name} Lv.${ct+1}`,icon:ab.icon,desc:tier.desc,rarity:ct===2?'epic':'rare',special:aid,tier:ct+1,apply:p=>{if(!p.specialTiers)p.specialTiers={};p.specialTiers[aid]=ct+1;if(!p.specialEffects)p.specialEffects={};p.specialEffects[aid]=tier.effect;}});
    }else if(!player.finalSpecials?.includes(aid)){
      ups.push({id:`${aid}_final`,name:ab.finalUpgrade.name,icon:ab.icon,desc:ab.finalUpgrade.desc,rarity:'legendary',isFinalSpecial:true,special:aid,apply:p=>{if(!p.finalSpecials)p.finalSpecials=[];p.finalSpecials.push(aid);}});
    }
  }
  return ups;
}

// 魂器技能释放：在角色技能释放后调用
function triggerArtifactSkill(px,py){
  const art=getEquippedArtifact(); if(!art)return;
  if(art.bossIdx===4){
    // 烛龙魂器：焚天烈焰 — 向最近敌人发射8发追踪熔岩弹+落地熔岩池
    playSound('dragonRoar');
    pushFloatingText(px,py-50,'🔥 焚天烈焰!','#ff6347',1.5);
    spawnParticles(px,py,'#ff6347',30);
    // 找最近的敌人作为目标
    let targetX=px, targetY=py-200;
    let nearestD=1e9;
    for(const e of enemies){if(!e.alive)continue;const d=dist(px,py,e.x,e.y);if(d<nearestD){nearestD=d;targetX=e.x;targetY=e.y;}}
    if(boss&&boss.alive){const d=dist(px,py,boss.x,boss.y);if(d<nearestD){targetX=boss.x;targetY=boss.y;}}
    // 8发追踪熔岩弹向目标扇形发射
    const baseAngle=Math.atan2(targetY-py,targetX-px);
    for(let i=0;i<8;i++){
      const a=baseAngle+(i-3.5)*0.15;
      const b=new Bullet(px,py,a,{speed:420,damage:5,homing:2.5,size:6});
      b.life=2.5; b.isFire=true; b.color='#ff6347'; b.glowColor='#ffaa00';
      bullets.push(b);
    }
    // 在目标位置生成3个熔岩池
    for(let i=0;i<3;i++){
      const fx=targetX+rand(-60,60), fy=targetY+rand(-60,60);
      fireEffects.push({x:fx,y:fy,radius:65,damage:0.5,life:3,maxLife:3,burnDmg:1.0,tick:0,chain:0,lavaPool:true});
      for(const e of enemies){if(!e.alive)continue;if(dist(fx,fy,e.x,e.y)<65)e.takeDamage(4);}
      if(boss&&boss.alive&&dist(fx,fy,boss.x,boss.y)<65)boss.takeDamage(4);
    }
  }else if(art.bossIdx===5){
    // 饕餮魂器：万象吞噬 — 张合的吞噬巨口+持续强拉拽+中心吞噬秒杀
    // 主题差异化：饕餮=吞噬(单点圆心+巨口张合动画+强拉拽+中心秒杀)，区别于穷奇的维度裂隙(多道长条裂缝)
    playSound('devour');
    const cx=px,cy=py,r=260;
    pushFloatingText(cx,cy-50,'🌀 万象吞噬!','#9370db',2);
    spawnParticles(cx,cy,'#9370db',60);
    // 紫色漩涡(中等范围，强拉拽)
    fireEffects.push({x:cx,y:cy,radius:r,damage:1.5,life:5,maxLife:5,burnDmg:0,tick:0,chain:0,blackhole:true,devourMaw:true});
    // 5波拉拽+伤害(每0.5秒一次)，拉拽强度递增
    for(let wave=0;wave<5;wave++){
      setTimeout(()=>{
        if(gameState!=='fighting'&&gameState!=='boss')return;
        for(const e of enemies){
          if(!e.alive)continue;
          const d=dist(cx,cy,e.x,e.y);
          if(d<r){
            const a=Math.atan2(cy-e.y,cx-e.x);
            // 强拉拽：距离越近拉得越猛
            const pull=Math.min(160,(r-d)*0.75);
            e.x+=Math.cos(a)*pull; e.y+=Math.sin(a)*pull;
            // 中心40半径内直接吞噬(秒杀小怪)
            if(d<45){
              e.health=0; e.die(null);
              spawnParticles(e.x,e.y,'#9370db',20);
              pushFloatingText(e.x,e.y-15,'吞噬!','#9370db',0.8);
            }else{
              e.takeDamage(4+wave);
              spawnParticles(e.x,e.y,'#9370db',3);
            }
          }
        }
        if(boss&&boss.alive){
          const d=dist(cx,cy,boss.x,boss.y);
          if(d<r){
            const a=Math.atan2(cy-boss.y,cx-boss.x);
            // Boss不被拉拽太远(避免破坏战斗)，但仍受到伤害
            boss.x+=Math.cos(a)*30; boss.y+=Math.sin(a)*30;
            // 中心区域：Boss受到额外伤害
            if(d<60){
              boss.takeDamage(25);
              spawnParticles(boss.x,boss.y,'#9370db',18);
              pushFloatingText(boss.x,boss.y-30,'吞噬重伤!','#9370db',1);
            }else{
              boss.takeDamage(8);
            }
          }
        }
      },wave*500);
    }
  }else if(art.bossIdx===8){
    // 穷奇魂器：维度裂隙 — 在战场上撕开6道长条形空间裂缝，持续4秒
    // 主题差异化：穷奇=维度撕裂(多道长条裂缝+从裂缝中喷出追踪弹+击退)，区别于饕餮的圆形吞噬巨口
    playSound('tigerRoar');
    pushFloatingText(px,py-60,'🌌 维度裂隙!','#a855f7',3);
    spawnParticles(px,py,'#a855f7',60);
    screenShake=0.5;
    // 生成6道长条形维度裂缝(随机位置/角度)
    const rifts=[];
    for(let i=0;i<6;i++){
      const ang=Math.random()*Math.PI*2;
      // 裂缝中心点：环绕玩家120-280半径
      const cd=120+Math.random()*160;
      const cx=px+Math.cos(ang)*cd;
      const cy=py+Math.sin(ang)*cd;
      // 裂缝方向：垂直于到玩家的方向(让玩家不易完全躲避)
      const riftAng=ang+Math.PI/2+(Math.random()-0.5)*0.6;
      const riftLen=180+Math.random()*80; // 180-260长度
      const rift={x:cx,y:cy,angle:riftAng,length:riftLen,width:22,life:4,maxLife:4};
      rifts.push(rift);
      // 创建长条形fireEffect(用voidRift渲染但加入维度裂隙专属标记)
      fireEffects.push({
        x:cx,y:cy,radius:riftLen/2,damage:0,life:4,maxLife:4,burnDmg:0,tick:0,chain:0,
        voidRift:true,dimensionRift:true,riftAngle:riftAng,riftLength:riftLen,riftWidth:rift.width
      });
    }
    // 4波维度脉冲：每0.8秒对所有裂缝上的敌人造成伤害+从裂缝喷出追踪弹
    for(let wave=0;wave<4;wave++){
      setTimeout(()=>{
        if(gameState!=='fighting'&&gameState!=='boss')return;
        screenShake=0.3;
        for(const r of rifts){
          spawnParticles(r.x,r.y,'#a855f7',15);
          // 计算裂缝端点
          const dx=Math.cos(r.angle), dy=Math.sin(r.angle);
          const halfLen=r.length/2;
          // 对裂缝上所有敌人造成伤害
          for(const e of enemies){
            if(!e.alive)continue;
            // 点到线段距离
            const ex=e.x-r.x, ey=e.y-r.y;
            const proj=ex*dx+ey*dy; // 投影长度
            const clamped=Math.max(-halfLen,Math.min(halfLen,proj));
            const px2=r.x+dx*clamped, py2=r.y+dy*clamped;
            const d=dist(e.x,e.y,px2,py2);
            if(d<r.width+e.size){
              e.takeDamage(6+wave*2);
              spawnParticles(e.x,e.y,'#a855f7',6);
              // 维度击退(沿裂缝法线方向)
              const nx=-dy, ny=dx;
              const sign=Math.sign(ex*nx+ey*ny)||1;
              e.x+=nx*sign*40; e.y+=ny*sign*40;
            }
          }
          if(boss&&boss.alive){
            const ex=boss.x-r.x, ey=boss.y-r.y;
            const proj=ex*dx+ey*dy;
            const clamped=Math.max(-halfLen,Math.min(halfLen,proj));
            const px2=r.x+dx*clamped, py2=r.y+dy*clamped;
            const d=dist(boss.x,boss.y,px2,py2);
            if(d<r.width+boss.size){
              boss.takeDamage(12);
              spawnParticles(boss.x,boss.y,'#a855f7',10);
            }
          }
          // 从裂缝端点喷出2发追踪维度弹
          for(let s=-1;s<=1;s+=2){
            const sx=r.x+dx*halfLen*s, sy=r.y+dy*halfLen*s;
            // 找最近敌人
            let nearest=null,nd=400;
            for(const e of enemies){if(!e.alive)continue;const d=dist(sx,sy,e.x,e.y);if(d<nd){nd=d;nearest=e;}}
            if(boss&&boss.alive){const d=dist(sx,sy,boss.x,boss.y);if(d<nd*1.5)nearest=boss;}
            if(nearest){
              const ba=Math.atan2(nearest.y-sy,nearest.x-sx);
              const b=new Bullet(sx,sy,ba,{speed:380,damage:7,homing:3.5,size:8});
              b.life=4; b.isVoid=true; b.color='#a855f7'; b.glowColor='#da77f2';
              bullets.push(b);
            }else{
              // 无目标时沿裂缝法线发射
              const fa=r.angle+Math.PI/2;
              const b=new Bullet(sx,sy,fa,{speed:380,damage:7,size:8});
              b.life=3; b.isVoid=true; b.color='#a855f7'; b.glowColor='#da77f2';
              bullets.push(b);
            }
          }
        }
        pushFloatingText(px,py-30,`维度脉冲${wave+1}!`,'#a855f7',1);
      },wave*800);
    }
    // 额外：初始释放8发维度弹扇形(给玩家即时反馈)
    const initAng=Math.atan2(py,px);
    for(let i=0;i<8;i++){
      const a=initAng+(i-3.5)*0.18;
      const b=new Bullet(px,py,a,{speed:360,damage:6,homing:2.5,size:7});
      b.life=3; b.isVoid=true; b.color='#a855f7'; b.glowColor='#da77f2';
      bullets.push(b);
    }
  }
}

// 生成随机装备
function generateGear(slot,rarity){
  const r=GEAR_RARITIES[rarity];
  const stats=[];
  const pool=[...GEAR_STAT_POOL];
  for(let i=0;i<r.statCount&&pool.length>0;i++){
    const idx=randInt(0,pool.length-1);
    const s=pool.splice(idx,1)[0];
    const val=s.min+Math.random()*(s.max-s.min);
    stats.push({ id:s.id, name:s.name, icon:s.icon, value:Math.round(val*100)/100 });
  }
  // 传说/神话装备额外获得专属词条
  let specialAffix=null;
  if(rarity==='legendary'){
    const aff=GEAR_LEGENDARY_AFFIXES[randInt(0,GEAR_LEGENDARY_AFFIXES.length-1)];
    specialAffix={id:aff.id,name:aff.name,icon:aff.icon,desc:aff.desc,special:true};
  }else if(rarity==='mythic'){
    const aff=GEAR_MYTHIC_AFFIXES[randInt(0,GEAR_MYTHIC_AFFIXES.length-1)];
    specialAffix={id:aff.id,name:aff.name,icon:aff.icon,desc:aff.desc,special:true};
  }
  const nameList=GEAR_NAMES[slot];
  const rarityIdx=GEAR_RARITY_ORDER.indexOf(rarity);
  const nameIdx=Math.min(rarityIdx, nameList.length-1);
  return {
    uid:Date.now()+Math.random(),
    slot, rarity,
    name:nameList[nameIdx],
    stats,
    specialAffix
  };
}
// 根据Boss掉落装备
function dropGear(bossIdx,isSuper){
  // 超级Boss掉落更高稀有度
  let rarity;
  const r=Math.random();
  if(isSuper){
    if(r<0.4)rarity='legendary';
    else if(r<0.75)rarity='epic';
    else rarity='rare';
  }else{
    if(r<0.1)rarity='legendary';
    else if(r<0.35)rarity='epic';
    else if(r<0.65)rarity='rare';
    else rarity='common';
  }
  const slot=GEAR_SLOTS[randInt(0,GEAR_SLOTS.length-1)];
  return generateGear(slot,rarity);
}
// 应用装备属性
function applyGearStats(p){
  let mythicCount=0, legendaryCount=0;
  for(const slot of GEAR_SLOTS){
    const g=saveData.equippedGear[slot];
    if(!g)continue;
    if(g.rarity==='mythic')mythicCount++;
    if(g.rarity==='legendary')legendaryCount++;
    for(const s of (g.stats||[])){
      const def=GEAR_STAT_POOL.find(x=>x.id===s.id);
      if(def)def.apply(p,s.value);
    }
    // 应用专属词条
    if(g.specialAffix){
      const affixPool=g.rarity==='mythic'?GEAR_MYTHIC_AFFIXES:GEAR_LEGENDARY_AFFIXES;
      const aff=affixPool.find(x=>x.id===g.specialAffix.id);
      if(aff)aff.apply(p);
    }
  }
  // 2件金装套装：+20%伤害
  if(legendaryCount>=2){p.bulletDamage*=1.2;}
  // 3件金装套装：+30%射速 +10%暴击
  if(legendaryCount>=3){p.baseFireCooldown*=0.7; p.critChance+=0.1;}
  // 4件金装套装：解锁"金色圣光"——每5秒恢复2点生命
  if(legendaryCount>=4){p.goldHalo=true; p.regenPerLevel=(p.regenPerLevel||0)+3;}
  // 4件红装（神话）套装特效：全属性大幅提升
  if(mythicCount>=4){
    p.bulletDamage*=2; p.speed*=1.5; p.maxHealth=Math.ceil(p.maxHealth*1.5); p.health=p.maxHealth;
    p.critChance=(p.critChance||0)+0.3; p.critDamage=(p.critDamage||2)+1;
    p.bulletPierce+=3; p.lifesteal=(p.lifesteal||0)+0.15;
  }
}
// 装备合成：3件同品质→50%几率升一阶
function synthesizeGears(uids){
  if(uids.length!==3)return{success:false,msg:'需要3件装备'};
  const gears=uids.map(uid=>saveData.gearBag.find(g=>String(g.uid)===String(uid))).filter(g=>g);
  if(gears.length!==3)return{success:false,msg:'找不到装备'};
  const rarity=gears[0].rarity;
  if(!gears.every(g=>g.rarity===rarity))return{success:false,msg:'需要相同品质'};
  if(rarity==='mythic')return{success:false,msg:'神话装备已是最高品质'};
  const curIdx=GEAR_RARITY_ORDER.indexOf(rarity);
  if(curIdx<0||curIdx>=GEAR_RARITY_ORDER.length-1)return{success:false,msg:'无法合成'};
  const newRarity=GEAR_RARITY_ORDER[curIdx+1];
  // 从背包移除3件
  for(const g of gears){
    const idx=saveData.gearBag.indexOf(g);
    if(idx>=0)saveData.gearBag.splice(idx,1);
  }
  // 50%成功率
  if(Math.random()<0.5){
    // 合成结果部位：30%概率从3件中选，70%概率完全随机（确保所有部位都可获得）
    let slot;
    if(Math.random()<0.3){
      slot=gears[randInt(0,2)].slot;
    }else{
      slot=GEAR_SLOTS[randInt(0,GEAR_SLOTS.length-1)];
    }
    const newGear=generateGear(slot,newRarity);
    saveData.gearBag.push(newGear);
    saveSave();
    return{success:true,msg:`合成成功！获得${GEAR_RARITIES[newRarity].name}品质的${newGear.name}！`,gear:newGear};
  }else{
    saveSave();
    return{success:false,msg:'合成失败！装备已消耗'};
  }
}

function checkAchievements(){
  let unlocked=[];
  const f=saveData.achievementFlags;
  // 同步数据
  f.petCount=saveData.ownedPets.length;
  f.uniquePetTypes=new Set(saveData.ownedPets.map(p=>p.def)).size;
  f.gearCount=saveData.gearBag.length+Object.values(saveData.equippedGear).filter(g=>g).length;
  f.legendaryCount=saveData.gearBag.filter(g=>g.rarity==='legendary').length+Object.values(saveData.equippedGear).filter(g=>g&&g.rarity==='legendary').length;
  f.fullGear=Object.values(saveData.equippedGear).every(g=>g);
  f.bossTypesKilled=Object.keys(saveData.bossPedia).length;
  for(const a of ACHIEVEMENTS){
    if(!saveData.achievements[a.id]){
      if(a.check(f)){
        saveData.achievements[a.id]={unlocked:true};
        saveData.totalScore+=a.reward;
        unlocked.push({...a,reward:a.reward});
      }
    }
  }
  return unlocked;
}

      o2.frequency.setValueAtTime(120,t); o2.frequency.exponentialRampToValueAtTime(60,t+0.8);

// ==================== 粒子 ====================
function spawnParticles(x,y,color,count){
  // 性能优化：超上限时减少生成数量
  if(particles.length>MAX_PARTICLES)count=Math.min(count,3);
  for(let i=0;i<count;i++){
    const a=rand(0,Math.PI*2), s=rand(30,150);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(0.3,0.8),maxLife:0.8,color,size:rand(2,5)});
  }
  // 硬上限：移除最老的粒子
  if(particles.length>MAX_PARTICLES)particles=particles.slice(-MAX_PARTICLES);
}
function updateParticles(dt){
  for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.92;p.vy*=0.92;p.life-=dt;}
  particles=particles.filter(p=>p.life>0);
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// Boss方向指示器（手机端：Boss在屏幕边缘或被遮挡时显示方向箭头）
function drawBossIndicator(){
  if(!isTouchDevice || !touchConfirmed) return;
  if(!boss || !boss.alive || !player || !player.alive) return;
  // 计算Boss相对玩家的方向
  const dx = boss.x - player.x;
  const dy = boss.y - player.y;
  const d = Math.sqrt(dx*dx + dy*dy);
  // 只在Boss距离较远时显示指示器
  if(d < 250) return;
  const angle = Math.atan2(dy, dx);
  // 在玩家周围80px处绘制方向箭头
  const r = 80;
  const ax = player.x + Math.cos(angle) * r;
  const ay = player.y + Math.sin(angle) * r;
  ctx.save();
  ctx.translate(ax, ay);
  ctx.rotate(angle);
  // 红色三角形箭头
  ctx.fillStyle = 'rgba(248, 81, 73, 0.85)';
  ctx.strokeStyle = 'rgba(255, 137, 122, 0.9)';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#f85149';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(15, 0);
  ctx.lineTo(-8, -10);
  ctx.lineTo(-4, 0);
  ctx.lineTo(-8, 10);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

  applyCrafts(){
    const crafts=saveData.weaponCrafts[saveData.currentWeapon]||[];
    // 递减机制：同id词条叠加时，第N个效果递减为 1/(N) 的效果（避免5词条全堆同一种过于强力）
    const counter={};
    for(const c of crafts){
      counter[c.id]=(counter[c.id]||0)+1;
      const stackIdx=counter[c.id]; // 第几个同类词条
      const eff=c.value/stackIdx; // 递减：第1个100%，第2个50%，第3个33%...
      if(c.id==='dmg')this.bulletDamage+=eff;
      else if(c.id==='cd')this.baseFireCooldown*=(1-eff);
      else if(c.id==='size')this.bulletSize+=eff;
      else if(c.id==='crit')this.critChance+=eff;
      else if(c.id==='pierce')this.bulletPierce+=Math.floor(eff); // 穿透取整
      else if(c.id==='count')this.bulletCount+=Math.floor(eff); // 子弹数取整
    }
  }
  update(dt){
    let dx=0,dy=0,mag=1;
    // 触摸摇杆输入（支持模拟速度和任意方向）
    if(touchMoveVec&&touchMoveVec.active){
      dx=touchMoveVec.x; dy=touchMoveVec.y;
      mag=Math.min(Math.sqrt(dx*dx+dy*dy),1);
    }else{
      // 键盘输入
      if(keys['w']||keys['arrowup'])dy-=1;
      if(keys['s']||keys['arrowdown'])dy+=1;
      if(keys['a']||keys['arrowleft'])dx-=1;
      if(keys['d']||keys['arrowright'])dx+=1;
    }
    this.moving=Math.abs(dx)>0.01||Math.abs(dy)>0.01;
    if(this.moving){
      const len=Math.sqrt(dx*dx+dy*dy); if(len>0){dx/=len; dy/=len;}
      let spd=this.speed*mag;
      if(this.quickfootTimer>0){spd*=2; this.quickfootTimer-=dt;}
      this.x+=dx*spd*dt; this.y+=dy*spd*dt;
      this.walkPhase+=dt*10;
    }
    this.x=clamp(this.x,this.size,CONFIG.WIDTH-this.size);
    this.y=clamp(this.y,this.size,CONFIG.HEIGHT-this.size);
    this.angle=Math.atan2(mouse.y-this.y,mouse.x-this.x);
    // 狂暴：击杀后攻速翻倍
    let actualFireCd=this.fireCooldown;
    if(this.rampageTimer&&this.rampageTimer>0){this.rampageTimer-=dt; actualFireCd-=dt*2;}
    else if(this.fireCooldown>0)actualFireCd-=dt;
    this.fireCooldown=Math.max(0,actualFireCd);
    // 刑天干戚战意增伤：计时器递减，归零后清空层数
    if(this.xingtianTimer&&this.xingtianTimer>0){
      this.xingtianTimer-=dt;
      if(this.xingtianTimer<=0){this.xingtianStacks=0;}
    }
    if(this.invincible>0)this.invincible-=dt;
    if(this._hazardTick&&this._hazardTick>0)this._hazardTick-=dt;
    if(this.skillCooldown>0)this.skillCooldown-=dt;
    if((mouse.down||keys[' '])&&this.fireCooldown<=0)this.shoot();
    if(keys['f']&&this.skillCooldown<=0)this.useSkill();
    // 皮肤特效：传说皮肤粒子拖尾
    const _skin=getEquippedSkin();
    if(_skin&&_skin.rarity==='legendary'){
      this.skinTrailTimer-=dt;
      if(this.skinTrailTimer<=0){
        this.skinTrailTimer=0.08;
        particles.push({x:this.x+rand(-8,8),y:this.y+rand(-8,8),vx:rand(-20,20),vy:rand(-30,-10),life:0.6,maxLife:0.6,color:_skin.color,size:rand(2,4)});
      }
    }
    // 皮肤特效：史诗皮肤走路残影
    if(_skin&&_skin.rarity==='epic'&&this.moving){
      this._afterimageTimer=(this._afterimageTimer||0)-dt;
      if(this._afterimageTimer<=0){
        this._afterimageTimer=0.12;
        this.skinAfterimages.push({x:this.x,y:this.y,angle:this.angle,life:0.4,maxLife:0.4});
      }
    }
    // 更新残影生命
    for(const a of this.skinAfterimages)a.life-=dt;
    this.skinAfterimages=this.skinAfterimages.filter(a=>a.life>0);
    // 特殊技能自动触发
    this.updateSpecials(dt);
    // 全局减速
    if(globalSlowTimer>0){globalSlowTimer-=dt; if(globalSlowTimer<=0)globalSlow=1;}
    // Roguelike遗物：护盾行者（移动时缓慢恢复护盾）
    if(this._relicShieldWalk&&this.moving&&this.maxShield>0&&this.shield<this.maxShield){
      this._shieldWalkAcc=(this._shieldWalkAcc||0)+dt;
      if(this._shieldWalkAcc>=2){this._shieldWalkAcc=0; this.shield=Math.min(this.shield+1,this.maxShield); spawnParticles(this.x,this.y,'#58a6ff',3);}
    }
    // Roguelike遗物：暴击连击计时器
    if(this._relicCritChainTime&&this._relicCritChainTime>0){this._relicCritChainTime-=dt; if(this._relicCritChainTime<0)this._relicCritChainTime=0;}
  }
  updateSpecials(dt){
    for(const[aid,effect]of Object.entries(this.specialEffects||{})){
      if(this.specialTimers[aid]===undefined)this.specialTimers[aid]=effect.interval||3;
      this.specialTimers[aid]-=dt;
      if(this.specialTimers[aid]<=0){
        this.specialTimers[aid]=effect.interval||3;
        this.triggerSpecial(aid,effect);
      }
    }
  }
  triggerSpecial(aid,effect){
    const fin=this.finalSpecials?.includes(aid);
    if(aid==='lightning'){
      // 自动追踪最近敌人雷击
      let target=null,nd=effect.range;
      for(const e of enemies){if(!e.alive)continue; const d=dist(this.x,this.y,e.x,e.y); if(d<nd){nd=d;target=e;}}
      if(boss&&boss.alive){const d=dist(this.x,this.y,boss.x,boss.y); if(d<nd*1.5){target=boss;}}
      if(target){
        const dmg=fin?effect.damage*2:effect.damage;
        lightningStrikes.push({x:target.x,y:target.y,life:0.5,dmg,chain:effect.chain||0,chainRange:effect.chainRange||150,chained:new Set()});
        spawnParticles(target.x,target.y,'#ffd700',15);
      }
    }else if(aid==='tornado'){
      // 释放龙卷风
      const tx=this.x+Math.cos(this.angle)*100;
      const ty=this.y+Math.sin(this.angle)*100;
      const dmg=fin?effect.damage*2:effect.damage;
      const rad=fin?effect.radius*2:effect.radius;
      tornadoes.push({x:tx,y:ty,vx:Math.cos(this.angle)*80,vy:Math.sin(this.angle)*80,radius:rad,damage:dmg,life:fin?999:effect.dur,maxLife:fin?999:effect.dur,tick:0});
    }
    // fireball 在子弹命中时触发，不在此处
  }
  shoot(){
    this.fireCooldown=this.baseFireCooldown;
    this.fireBullets(this.angle);
    // 双发：额外发射一次（无冷却消耗）
    if(this.doubleTap){this.fireBullets(this.angle+0.08);}
    // 装备多重射击：额外发射子弹
    if(this.multishot){
      for(let i=0;i<this.multishot;i++){
        this.fireBullets(this.angle+(i%2===0?0.15:-0.15)*(Math.floor(i/2)+1));
      }
    }
    // Roguelike遗物：多重施法（10%几率额外发射一轮）
    if(hasRelic('multicast')&&Math.random()<0.10){
      this.fireBullets(this.angle+0.2);
      pushFloatingText(this.x,this.y-30,'✨多重施法','#bc8cff',0.8);
    }
  }
  fireBullets(baseAngle){
    // 狂暴：生命低于30%伤害翻倍
    let dmgMul=(this.berserk&&this.health<this.maxHealth*0.3)?2:1;
    // Roguelike遗物：狂战士（生命低于50%伤害+30%）
    if(this._relicBerserker&&this.health<this.maxHealth*0.5)dmgMul*=1.3;
    // 刑天干戚战意增伤：每层+5%伤害（最多3层=+15%）
    if(this.weaponId==='xingtiangeqi'&&this.xingtianStacks>0){dmgMul*=1+0.05*this.xingtianStacks;}
    // 刑天干戚血怒：血量越低伤害越高（最高+50%）
    if(this.weaponId==='xingtiangeqi'){
      const hpPct=this.health/this.maxHealth;
      const rageMul=1+(1-hpPct)*0.5; // 满血1x，残血1.5x
      dmgMul*=rageMul;
    }
    // Roguelike遗物：暴击连击（暴击伤害+50%）
    let critMul=this.critDamage;
    if(this._relicCritChainTime&&this._relicCritChainTime>0){critMul*=1.5;}
    const count=this.bulletCount, spread=this.bulletSpread;
    for(let i=0;i<count;i++){
      let ba=baseAngle;
      if(count>1)ba=baseAngle-spread*(count-1)/2+spread*i;
      const bx=this.x+Math.cos(ba)*(this.size+4), by=this.y+Math.sin(ba)*(this.size+4);
      const isCrit=Math.random()<this.critChance;
      const dmg=isCrit?this.bulletDamage*critMul*dmgMul:this.bulletDamage*dmgMul;
      bullets.push(new Bullet(bx,by,ba,{speed:this.bulletSpeed,damage:dmg,pierce:this.bulletPierce,homing:this.bulletHoming,size:this.bulletSize,bounce:this.bounce,isCrit,elementEffects:{...this.elementEffects},finalUpgrades:[...this.finalUpgrades],specialEffects:{...this.specialEffects},finalSpecials:[...this.finalSpecials],lifesteal:this.lifesteal||0,weaponId:this.weaponId,chainCount:this.weaponId==='thunder'?2:0,voidTrail:this.weaponId==='voidbow',boomerang:this.weaponId==='xingtiangeqi',originX:this.x,originY:this.y,boomerangMaxDist:380+this.bulletSize*2}));
    }
  }
  useSkill(){
    const c=getCurrentCharacter(); this.skillCooldown=this.maxSkillCooldown;
    if(c.id==='default'){
      for(let i=0;i<24;i++){
        const a=(i/24)*Math.PI*2;
        bullets.push(new Bullet(this.x+Math.cos(a)*(this.size+4),this.y+Math.sin(a)*(this.size+4),a,{speed:this.bulletSpeed*0.9,damage:this.bulletDamage,size:this.bulletSize,elementEffects:{...this.elementEffects},finalUpgrades:[...this.finalUpgrades],specialEffects:{...this.specialEffects},finalSpecials:[...this.finalSpecials],weaponId:this.weaponId}));
      }
      spawnParticles(this.x,this.y,'#58a6ff',30);
      pushFloatingText(this.x,this.y-30,'弹幕风暴!','#58a6ff',1);
    }else if(c.id==='ninja'){
      minions.push(new Minion(this.x+40,this.y)); minions.push(new Minion(this.x-40,this.y));
      spawnParticles(this.x,this.y,'#bc8cff',30);
      pushFloatingText(this.x,this.y-30,'影分身!','#bc8cff',1);
    }else if(c.id==='taoist'){
      // 道士：召唤3张符箓环绕攻击
      for(let i=0;i<3;i++)minions.push(new TaoistTalisman(this.x,this.y,i));
      spawnParticles(this.x,this.y,'#3fb950',25);
      pushFloatingText(this.x,this.y-30,'符箓阵!','#3fb950',1);
    }else if(c.id==='monk'){
      // 武僧：5秒无敌+霸体
      this.invincible=5;
      spawnParticles(this.x,this.y,'#f0883e',40);
      pushFloatingText(this.x,this.y-30,'金刚护体!','#f0883e',1);
    }else if(c.id==='shaman'){
      // 巫祝：元素风暴(冰+雷+火) - 三种元素效果明显差异化
      for(let i=0;i<18;i++){
        const a=(i/18)*Math.PI*2;
        const el=i%3===0?'ice':(i%3===1?'lightning':'fire');
        const elEffects={};
        if(el==='ice')elEffects.ice={slow:0.7,slowDur:3,freezeChance:1,freezeDur:1.0}; // 冰：冻结1秒+减速70%
        if(el==='lightning')elEffects.lightning={chain:3,damage:5,chainRange:200,chainDmg:0.6}; // 雷：连锁3次
        const fireSpecial=el==='fire'?{fireball:{radius:90,burnDmg:1.2,burnDur:3,chain:1}}:{};
        bullets.push(new Bullet(this.x+Math.cos(a)*(this.size+4),this.y+Math.sin(a)*(this.size+4),a,{speed:this.bulletSpeed*0.85,damage:this.bulletDamage*1.5,size:this.bulletSize+3,elementEffects:elEffects,finalUpgrades:[],specialEffects:fireSpecial,finalSpecials:[]}));
      }
      spawnParticles(this.x,this.y,'#daa520',45);
      pushFloatingText(this.x,this.y-30,'❄⚡🔥 元素乱舞!','#daa520',1.2);
    }else if(c.id==='engineer'){
      // 机关师：放置自动炮台8秒
      const tx=this.x+Math.cos(this.angle)*60, ty=this.y+Math.sin(this.angle)*60;
      minions.push(new EngineerTurret(tx,ty));
      spawnParticles(tx,ty,'#8b949e',25);
      pushFloatingText(this.x,this.y-30,'机关炮台!','#8b949e',1);
    }
    // 魂器技能：与角色技能一同释放
    triggerArtifactSkill(this.x,this.y);
    updateUI();
  }
  takeDamage(dmg){
    if(this.invincible>0)return;
    // 闪避：概率免疫伤害
    if(this.dodgeChance&&Math.random()<this.dodgeChance){
      pushFloatingText(this.x,this.y-30,'闪避!','#58a6ff',0.8);
      spawnParticles(this.x,this.y,'#58a6ff',10); return;
    }
    if(this.shield>0){
      // 护盾免疫：消耗一次免疫层
      if(this.shieldImmune&&this.shieldImmune>0){this.shieldImmune--; this.invincible=0.8; pushFloatingText(this.x,this.y-30,'护盾免疫!','#58a6ff',1); spawnParticles(this.x,this.y,'#58a6ff',20); updateUI(); return;}
      this.shield--; this.invincible=0.5; spawnParticles(this.x,this.y,'#58a6ff',12); updateUI(); return;
    }
    this.health-=dmg; this.invincible=CONFIG.PLAYER.INVINCIBLE_TIME;
    // 疾跑：受伤后1秒移速翻倍
    if(this.quickfoot){this.quickfootTimer=1;}
    // 荆棘反伤
    if(this.thornsDmg){
      // 反弹伤害给最近的敌人或Boss
      let nearest=null,nd=150;
      for(const e of enemies){if(!e.alive)continue;const d=dist(this.x,this.y,e.x,e.y);if(d<nd){nd=d;nearest=e;}}
      if(boss&&boss.alive&&dist(this.x,this.y,boss.x,boss.y)<200)nearest=boss;
      if(nearest){nearest.takeDamage(this.thornsDmg); spawnParticles(nearest.x,nearest.y,'#c0c0c0',8);}
    }
    spawnParticles(this.x,this.y,'#f85149',15); updateUI();
    playSound('hurt');
    if(this.health<=0){
      if(this.revives>0&&revivesUsed<this.revives){this.revives--; this.health=Math.ceil(this.maxHealth*0.5); this.invincible=2; spawnParticles(this.x,this.y,'#3fb950',40); pushFloatingText(this.x,this.y-30,'复活!','#3fb950',1.5);}
      else triggerDeathAnimation();
    }
  }
  heal(a){this.health=Math.min(this.health+a,this.maxHealth); spawnParticles(this.x,this.y,'#3fb950',15); updateUI();}
  addShield(a){this.shield=Math.min(this.shield+a,this.maxShield); spawnParticles(this.x,this.y,'#58a6ff',15); updateUI();}
  draw(){
    // 史诗皮肤：绘制走路残影（在主体之前）
    const _skin=getEquippedSkin();
    if(_skin&&_skin.rarity==='epic'&&this.skinAfterimages&&this.skinAfterimages.length>0){
      for(const a of this.skinAfterimages){
        ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.angle);
        ctx.globalAlpha=(a.life/a.maxLife)*0.4;
        ctx.fillStyle=_skin.color;
        ctx.beginPath();ctx.arc(0,0,this.size*0.9,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
      ctx.globalAlpha=1;
    }
    ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.angle);
    if(this.invincible>0&&Math.floor(this.invincible*12)%2===0)ctx.globalAlpha=0.4;
    const bob=this.moving?Math.sin(this.walkPhase)*2:Math.sin(Date.now()/500)*1;
    const ch=getCurrentCharacter();
    const skin=getEquippedSkin();
    const playerColor=skin?skin.color:ch.color;
    const s=this.size;
    ctx.translate(0,bob);
    // 皮肤特效光环
    if(skin){
      if(skin.rarity==='legendary'){
        // 传说皮肤：脉冲光环
        const pulse=Math.sin(Date.now()/200)*0.2+0.6;
        ctx.strokeStyle=`rgba(255,215,0,${pulse})`; ctx.lineWidth=2;
        ctx.shadowColor=skin.color; ctx.shadowBlur=15;
        ctx.beginPath(); ctx.arc(0,0,s+12,0,Math.PI*2); ctx.stroke();
        ctx.shadowBlur=0;
      }else if(skin.rarity==='epic'){
        // 史诗皮肤：紫色幻影
        ctx.strokeStyle=`rgba(155,122,255,${Math.sin(Date.now()/300)*0.2+0.4})`; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(0,0,s+9,0,Math.PI*2); ctx.stroke();
      }
    }
    // 护盾光环
    if(this.shield>0){ctx.strokeStyle=`rgba(88,166,255,${0.5+Math.sin(Date.now()/200)*0.2})`; ctx.lineWidth=2.5; ctx.shadowColor='#58a6ff'; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(0,0,s+7,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;}
    // 身体（圆形）
    ctx.fillStyle=playerColor; ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
    ctx.shadowColor=playerColor; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(0,0,s*0.9,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    // 高光
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.ellipse(-s*0.3,-s*0.35,s*0.25,s*0.18,-0.5,0,Math.PI*2); ctx.fill();
    // 三角形帽子（古风头巾）
    ctx.fillStyle=playerColor; ctx.strokeStyle='rgba(212,160,23,0.8)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-s*0.7,-s*0.5); ctx.lineTo(0,-s*1.3); ctx.lineTo(s*0.7,-s*0.5); ctx.closePath(); ctx.fill(); ctx.stroke();
    // 帽子飘带
    ctx.strokeStyle='rgba(212,160,23,0.6)'; ctx.lineWidth=1.5; ctx.lineCap='round';
    const rib=Math.sin(Date.now()/300)*s*0.15;
    ctx.beginPath(); ctx.moveTo(-s*0.5,-s*0.55); ctx.quadraticCurveTo(-s*0.9,-s*0.4+rib,-s*1.1,-s*0.6+rib); ctx.stroke();
    // 武器（小弓/枪剪影，朝右）
    ctx.strokeStyle='#8b5a2b'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(s*0.8,0,s*0.6,-0.9,0.9); ctx.stroke();
    ctx.strokeStyle='#d4a017'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(s*0.35,-s*0.5); ctx.lineTo(s*0.35,s*0.5); ctx.stroke();
    // 眼睛（朝向）
    const look=1;
    drawCartoonEye(s*0.2,-s*0.15,s*0.18,look);
    // 眉毛（英气）
    ctx.strokeStyle=ch.color; ctx.lineWidth=2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(s*0.05,-s*0.35); ctx.lineTo(s*0.35,-s*0.3); ctx.stroke();
    ctx.restore();
    // 头顶血条（不随身体旋转）
    const barW=44,barH=5,barY=this.y-this.size-18;
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(this.x-barW/2-1,barY-1,barW+2,barH+2);
    const hpPct=Math.max(0,this.health/this.maxHealth);
    const hpGrad=ctx.createLinearGradient(this.x-barW/2,0,this.x+barW/2,0);
    hpGrad.addColorStop(0,'#f85149'); hpGrad.addColorStop(1,'#fb8548');
    ctx.fillStyle=hpGrad; ctx.fillRect(this.x-barW/2,barY,barW*hpPct,barH);
    // 护盾条
    if(this.shield>0){
      ctx.fillStyle='#58a6ff'; ctx.fillRect(this.x-barW/2,barY-barH-2,barW*(this.shield/this.maxShield),3);
    }
    // 技能CD条
    const cdPct=1-this.skillCooldown/this.maxSkillCooldown;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(this.x-barW/2-1,barY+barH+1,barW+2,4);
    const cdGrad=ctx.createLinearGradient(this.x-barW/2,0,this.x+barW/2,0);
    cdGrad.addColorStop(0,'#bc8cff'); cdGrad.addColorStop(1,'#d2a8ff');
    ctx.fillStyle=cdGrad; ctx.fillRect(this.x-barW/2,barY+barH+2,barW*cdPct,3);
    // CD就绪标记
    if(this.skillCooldown<=0){
      ctx.fillStyle='#d2a8ff'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('F',this.x,barY+barH+12);
    }
  }
}

// ==================== 跟班 ====================
class Minion {
  constructor(x,y){
    this.x=x;this.y=y;this.size=14;this.alive=true;this.lifetime=5;
    this.fireCooldown=0;this.angle=0;this.orbitAngle=rand(0,Math.PI*2);this.wobble=0;
  }
  update(dt){
    this.lifetime-=dt; if(this.lifetime<=0){this.alive=false; spawnParticles(this.x,this.y,'#bc8cff',15); return;}
    this.wobble+=dt*5; this.orbitAngle+=dt*1.5;
    if(player){const tx=player.x+Math.cos(this.orbitAngle)*80,ty=player.y+Math.sin(this.orbitAngle)*80; this.x+=(tx-this.x)*5*dt; this.y+=(ty-this.y)*5*dt;}
    let target=null,nd=300;
    for(const e of enemies){if(!e.alive)continue; const d=dist(this.x,this.y,e.x,e.y); if(d<nd){nd=d;target=e;}}
    if(boss&&boss.alive){const d=dist(this.x,this.y,boss.x,boss.y); if(d<nd*1.5)target=boss;}
    if(target){
      this.angle=Math.atan2(target.y-this.y,target.x-this.x);
      if(this.fireCooldown<=0){
        this.fireCooldown=0.3;
        const ic=Math.random()<(player?.critChance||0);
        const dmg=ic?(player?.bulletDamage||1)*(player?.critDamage||2):(player?.bulletDamage||1);
        bullets.push(new Bullet(this.x,this.y,this.angle,{speed:500,damage:dmg,size:4,isCrit:ic,elementEffects:player?{...player.elementEffects}:{},finalUpgrades:player?[...player.finalUpgrades]:[],specialEffects:player?{...player.specialEffects}:{},finalSpecials:player?[...player.finalSpecials]:[]}));
      }
    }
    if(this.fireCooldown>0)this.fireCooldown-=dt;
  }
  draw(){
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.angle);
    ctx.globalAlpha=0.75+Math.sin(this.wobble)*0.2;
    const s=this.size;
    // 翅膀拍动
    const wing=Math.sin(this.wobble*3)*s*0.4;
    ctx.fillStyle='rgba(188,140,255,0.5)';ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(-s*0.6,-s*0.3,s*0.5,s*0.3+wing*0.3,-0.5,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.ellipse(s*0.6,-s*0.3,s*0.5,s*0.3+wing*0.3,0.5,0,Math.PI*2);ctx.fill();ctx.stroke();
    // 发光身体
    ctx.fillStyle='#bc8cff';ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;
    ctx.shadowColor='#bc8cff';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(0,0,s*0.7,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;
    // 高光
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath();ctx.ellipse(-s*0.2,-s*0.25,s*0.18,s*0.12,-0.5,0,Math.PI*2);ctx.fill();
    // 眼睛
    drawCartoonEye(-s*0.2,-s*0.05,s*0.15,1);
    drawCartoonEye(s*0.2,-s*0.05,s*0.15,1);
    ctx.restore();
  }
}

// ==================== 子弹 ====================
class Bullet {
  constructor(x,y,angle,opts={}){
    this.x=x;this.y=y;this.angle=angle;this.size=opts.size||CONFIG.PLAYER.BULLET_SIZE;
    this.speed=opts.speed||CONFIG.PLAYER.BULLET_SPEED;this.damage=opts.damage||CONFIG.PLAYER.BULLET_DAMAGE;
    this.pierce=opts.pierce||0;this.homing=opts.homing||0;this.bounce=opts.bounce||0;
    this.hitEnemies=new Set();this.trail=[];this.alive=true;this.isCrit=opts.isCrit||false;
    this.elementEffects=opts.elementEffects||{};this.finalUpgrades=opts.finalUpgrades||[];
    this.specialEffects=opts.specialEffects||{};this.finalSpecials=opts.finalSpecials||[];
    this.chainedEnemies=new Set();this.lifesteal=opts.lifesteal||0;
    this.weaponId=opts.weaponId||null; // 武器ID，用于差异化视觉
    this.spin=Math.random()*Math.PI*2; // 旋转动画(震天锤用)
    // 武器攻击机制差异
    this.chainCount=opts.chainCount||0; // 雷神炮闪电链剩余跳跃次数
    this.hasExploded=false; // 震天锤是否已爆炸
    this.voidTrail=opts.voidTrail||false; // 虚空之弓是否留下虚空裂缝
    this.voidTimer=0; // 虚空之弓裂缝计时器
    // 刑天干戚专属：回旋斧机制
    this.boomerang=opts.boomerang||false; // 是否为回旋子弹
    this.boomerangTime=0; // 回旋时间
    this.boomerangMaxDist=opts.boomerangMaxDist||420; // 最大飞行距离
    this.boomerangPhase=0; // 0=飞出, 1=返回
    this.originX=opts.originX||x; // 起点X
    this.originY=opts.originY||y; // 起点Y
  }
  update(dt){
    // 诸葛连弩/神臂弓等高速武器减少trail长度以优化性能
    const maxTrail=(this.weaponId==='crossbow'||this.weaponId==='bow')?4:8;
    this.trail.push({x:this.x,y:this.y}); if(this.trail.length>maxTrail)this.trail.shift();
    // life属性：魂器子弹等可以设置life限制寿命
    if(this.life!==undefined){
      this.life-=dt;
      if(this.life<=0){this.alive=false; return;}
    }
    // 虚空之弓：飞行时留下虚空裂缝（持续1秒，对经过敌人造成伤害）
    if(this.voidTrail){
      this.voidTimer+=dt;
      if(this.voidTimer>=0.08){
        this.voidTimer=0;
        fireEffects.push({x:this.x,y:this.y,radius:22,damage:0.4,life:1,maxLife:1,burnDmg:0.4,tick:0,chain:0,voidRift:true});
      }
    }
    if(this.homing>0){
      let nearest=null,nd=200;
      for(const e of enemies){if(!e.alive||this.hitEnemies.has(e))continue; const d=dist(this.x,this.y,e.x,e.y); if(d<nd){nd=d;nearest=e;}}
      if(boss&&boss.alive&&!this.hitEnemies.has(boss)){const d=dist(this.x,this.y,boss.x,boss.y); if(d<nd*1.5)nearest=boss;}
      if(nearest){const ta=Math.atan2(nearest.y-this.y,nearest.x-this.x); let diff=ta-this.angle; while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2; this.angle+=diff*this.homing*dt;}
    }
    // 刑天干戚回旋机制：飞出最大距离后折返，折返时重置命中列表实现二次伤害
    if(this.boomerang){
      this.boomerangTime+=dt;
      if(this.boomerangPhase===0){
        // 飞出阶段
        this.x+=Math.cos(this.angle)*this.speed*dt;
        this.y+=Math.sin(this.angle)*this.speed*dt;
        const d=dist(this.x,this.y,this.originX,this.originY);
        if(d>=this.boomerangMaxDist){
          this.boomerangPhase=1; // 切换到返回阶段
          this.hitEnemies=new Set(); // 清空命中列表，允许二次伤害
          // 返回角度：朝向玩家当前位置
          if(player)this.angle=Math.atan2(player.y-this.y,player.x-this.x);
        }
      }else{
        // 返回阶段：追踪玩家
        if(player){
          const ta=Math.atan2(player.y-this.y,player.x-this.x);
          let diff=ta-this.angle; while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
          this.angle+=diff*5*dt; // 较强的追踪
        }
        this.x+=Math.cos(this.angle)*this.speed*1.2*dt;
        this.y+=Math.sin(this.angle)*this.speed*1.2*dt;
        // 回到玩家附近时消失
        if(player&&dist(this.x,this.y,player.x,player.y)<player.size+10){
          this.alive=false;
          spawnParticles(this.x,this.y,'#ff4500',10);
        }
      }
      // 旋转动画(回旋斧旋转更快)
      this.spin+=0.6;
      // 超时保护
      if(this.boomerangTime>4)this.alive=false;
    }else{
      this.x+=Math.cos(this.angle)*this.speed*dt; this.y+=Math.sin(this.angle)*this.speed*dt;
    }
    if(this.bounce>0){
      if(this.x<=this.size||this.x>=CONFIG.WIDTH-this.size){this.angle=Math.PI-this.angle;this.x=clamp(this.x,this.size,CONFIG.WIDTH-this.size);this.bounce--;spawnParticles(this.x,this.y,'#ffd700',4);}
      if(this.y<=this.size||this.y>=CONFIG.HEIGHT-this.size){this.angle=-this.angle;this.y=clamp(this.y,this.size,CONFIG.HEIGHT-this.size);this.bounce--;spawnParticles(this.x,this.y,'#ffd700',4);}
    }
    if(!this.boomerang){
      if(this.x<-30||this.x>CONFIG.WIDTH+30||this.y<-30||this.y>CONFIG.HEIGHT+30)this.alive=false;
    }
  }
  getBaseColor(){
    if(this.elementEffects.ice)return '#79c0ff';
    if(this.elementEffects.lightning)return '#fff700';
    if(this.specialEffects.fireball)return '#ff6b35';
    // 武器专属颜色
    if(this.weaponId==='thunder')return '#ffe066';
    if(this.weaponId==='voidbow')return '#c084fc';
    if(this.weaponId==='xingtiangeqi')return '#ff4500';
    if(this.weaponId==='crossbow')return '#a3e635';
    if(this.weaponId==='sniper')return '#60a5fa';
    if(this.weaponId==='hammer')return '#fb923c';
    if(this.weaponId==='shotgun')return '#fbbf24';
    if(this.weaponId==='bow')return '#34d399';
    return '#ffd700';
  }
  draw(){
    const c=this.getBaseColor();
    const critColor='#fffacd';
    const drawColor=this.isCrit?critColor:c;
    const cr=(col)=>`rgba(${parseInt(col.substr(1,2),16)},${parseInt(col.substr(3,2),16)},${parseInt(col.substr(5,2),16)},`;
    // 武器专属拖尾
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],a=(i/this.trail.length)*0.4,s=this.size*(i/this.trail.length)*0.8;
      ctx.fillStyle=this.isCrit?`rgba(255,250,205,${a})`:`${cr(c)}${a})`;
      if(this.weaponId==='thunder'){
        // 雷神炮：锯齿状闪电拖尾
        ctx.fillRect(t.x-s/2,t.y-s/2,s,s);
      }else if(this.weaponId==='voidbow'){
        // 虚空之弓：星点拖尾
        if(i%2===0)ctx.beginPath(),ctx.arc(t.x,t.y,s*0.6,0,Math.PI*2),ctx.fill();
      }else{
        ctx.beginPath();ctx.arc(t.x,t.y,s,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.fillStyle=drawColor; ctx.shadowColor=drawColor; ctx.shadowBlur=this.isCrit?22:(this.weaponId==='crossbow'?6:12);
    // 武器专属主体
    if(this.weaponId==='hammer'){
      // 震天锤：旋转方块
      this.spin+=0.3;
      ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.spin);
      ctx.fillRect(-this.size,-this.size,this.size*2,this.size*2);
      ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;ctx.strokeRect(-this.size,-this.size,this.size*2,this.size*2);
      ctx.restore();
    }else if(this.weaponId==='thunder'){
      // 雷神炮：闪电球+电弧
      ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle=`rgba(255,224,102,${0.6+Math.sin(Date.now()/100)*0.3})`;ctx.lineWidth=1.5;
      for(let i=0;i<3;i++){
        const a=Math.random()*Math.PI*2, r1=this.size+2, r2=this.size+6+Math.random()*4;
        ctx.beginPath();ctx.moveTo(this.x+Math.cos(a)*r1,this.y+Math.sin(a)*r1);
        ctx.lineTo(this.x+Math.cos(a)*r2,this.y+Math.sin(a)*r2);ctx.stroke();
      }
    }else if(this.weaponId==='voidbow'){
      // 虚空之弓：紫黑洞口+空间裂缝
      ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      // 空间裂缝环
      ctx.strokeStyle=`rgba(192,132,252,${0.7+Math.sin(Date.now()/120)*0.2})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(this.x,this.y,this.size+4,0,Math.PI*2);ctx.stroke();
      // 旋转的小裂缝
      for(let i=0;i<3;i++){
        const a=Date.now()/200+i*Math.PI*2/3;
        ctx.beginPath();ctx.moveTo(this.x+Math.cos(a)*(this.size+2),this.y+Math.sin(a)*(this.size+2));
        ctx.lineTo(this.x+Math.cos(a)*(this.size+8),this.y+Math.sin(a)*(this.size+8));ctx.stroke();
      }
    }else if(this.weaponId==='crossbow'){
      // 诸葛连弩：箭矢形（拉长椭圆）
      ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.angle);
      ctx.beginPath();ctx.ellipse(0,0,this.size*1.5,this.size*0.6,0,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      ctx.restore();
    }else if(this.weaponId==='sniper'){
      // 狙击枪：细长光束
      ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.angle);
      ctx.fillRect(-this.size*1.5,-this.size*0.4,this.size*3,this.size*0.8);
      ctx.shadowBlur=0;
      ctx.restore();
    }else if(this.weaponId==='bow'){
      // 神臂弓：青色箭头
      ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }else if(this.weaponId==='xingtiangeqi'){
      // 刑天干戚：旋转的战斧(双刃斧头+红色火焰拖尾) — spin由update()递增，这里只读取
      ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.spin);
      const s=this.size;
      // 外层红色火焰光晕
      ctx.shadowColor='#ff4500'; ctx.shadowBlur=18;
      ctx.fillStyle='rgba(255,69,0,0.5)';
      ctx.beginPath();ctx.arc(0,0,s*1.6,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      // 斧柄：暗灰色长杆
      ctx.strokeStyle='#3a2a1a'; ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(0,-s*1.2);ctx.lineTo(0,s*1.2);ctx.stroke();
      // 上斧刃：银白色月牙(带红色镶边)
      ctx.fillStyle='#e8e8e8'; ctx.strokeStyle='#ff4500'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(0,-s*1.2);
      ctx.quadraticCurveTo(s*1.3,-s*1.0, s*0.9,-s*0.5);
      ctx.quadraticCurveTo(s*0.4,-s*0.85, 0,-s*0.6);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // 下斧刃：对称
      ctx.beginPath();
      ctx.moveTo(0,s*1.2);
      ctx.quadraticCurveTo(s*1.3,s*1.0, s*0.9,s*0.5);
      ctx.quadraticCurveTo(s*0.4,s*0.85, 0,s*0.6);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // 中心装饰：血红宝石
      ctx.fillStyle='#8b0000';
      ctx.beginPath();ctx.arc(0,0,s*0.3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff4500';
      ctx.beginPath();ctx.arc(0,0,s*0.15,0,Math.PI*2);ctx.fill();
      ctx.restore();
      // 回旋阶段标记：返回时拖尾更激烈
      if(this.boomerangPhase===1){
        ctx.fillStyle='rgba(255,69,0,0.3)';
        ctx.beginPath();ctx.arc(this.x,this.y,s*2.0,0,Math.PI*2);ctx.fill();
      }
    }else{
      // 默认：圆形子弹
      ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
    // 玩家子弹白色内核（区分敌方子弹）
    if(this.weaponId!=='hammer'&&this.weaponId!=='voidbow'&&this.weaponId!=='xingtiangeqi'){
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.beginPath();ctx.arc(this.x,this.y,Math.max(1,this.size*0.45),0,Math.PI*2);ctx.fill();
    }
    if(this.pierce>0){ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(this.x,this.y,this.size+2,0,Math.PI*2);ctx.stroke();}

class EnemyBullet {
  constructor(x,y,angle,speed=180,size=6,color='#ff3860'){this.x=x;this.y=y;this.angle=angle;this.speed=speed;this.size=size;this.color=color;this.alive=true;this.trail=[];this.homing=0;this.life=8;}
  update(dt){
    this.trail.push({x:this.x,y:this.y});if(this.trail.length>5)this.trail.shift();
    this.life-=dt; if(this.life<=0)this.alive=false;
    // 追踪：宠物子弹追踪敌人，敌方子弹追踪玩家
    if(this.homing>0){
      let target=null;
      if(this.fromPet){
        // 宠物子弹追踪最近的敌人或Boss
        let nd=400;
        for(const e of enemies){if(!e.alive)continue;const d=dist(this.x,this.y,e.x,e.y);if(d<nd){nd=d;target=e;}}
        if(boss&&boss.alive){const d=dist(this.x,this.y,boss.x,boss.y);if(d<nd*1.5)target=boss;}
      }else if(player){
        target=player;
      }
      if(target){
        const ta=Math.atan2(target.y-this.y,target.x-this.x);
        let diff=ta-this.angle; while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
        this.angle+=diff*this.homing*dt;
      }
    }
    this.x+=Math.cos(this.angle)*this.speed*dt; this.y+=Math.sin(this.angle)*this.speed*dt;
    if(this.x<-30||this.x>CONFIG.WIDTH+30||this.y<-30||this.y>CONFIG.HEIGHT+30)this.alive=false;
  }
  draw(){
    // 拖尾统一红色系
    for(let i=0;i<this.trail.length;i++){const t=this.trail[i],a=(i/this.trail.length)*0.35;ctx.fillStyle=`rgba(255,56,96,${a})`;ctx.beginPath();ctx.arc(t.x,t.y,this.size*(i/this.trail.length),0,Math.PI*2);ctx.fill();}
    // 红色外环（区分玩家子弹）
    ctx.strokeStyle='rgba(255,56,96,0.8)';ctx.lineWidth=2;ctx.shadowColor='#ff3860';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size+1.5,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
    // 主体
    ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    // 深色内核（与玩家白色内核区分）
    ctx.fillStyle='rgba(80,0,20,0.7)';
    ctx.beginPath();ctx.arc(this.x,this.y,Math.max(1,this.size*0.4),0,Math.PI*2);ctx.fill();
  }
}

function drawCartoonEye(x,y,r,look=0){

    // 嘲讽光环

  drawShape(fc){

    const look=Math.cos(this.angle),lookY=Math.sin(this.angle);

        // 小角

        ctx.beginPath();ctx.moveTo(-s*0.4,-s*0.5);ctx.lineTo(-s*0.55,-s*1.15);ctx.lineTo(-s*0.2,-s*0.6);ctx.closePath();ctx.fill();
        ctx.beginPath();ctx.moveTo(s*0.4,-s*0.5);ctx.lineTo(s*0.55,-s*1.15);ctx.lineTo(s*0.2,-s*0.6);ctx.closePath();ctx.fill();
        // 眼

        // 尖牙嘴
        ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,s*0.3,s*0.22,0,Math.PI);ctx.stroke();
        ctx.fillStyle='white';ctx.beginPath();ctx.moveTo(-s*0.1,s*0.3);ctx.lineTo(-s*0.05,s*0.5);ctx.lineTo(0,s*0.3);ctx.closePath();ctx.fill();
        ctx.beginPath();ctx.moveTo(s*0.1,s*0.3);ctx.lineTo(s*0.05,s*0.5);ctx.lineTo(0,s*0.3);ctx.closePath();ctx.fill();

      case'golem':{ // 石灵：石头人

        ctx.lineTo(s*0.7,s*0.8);ctx.lineTo(-s*0.7,s*0.8);ctx.closePath();

        // 裂纹

        ctx.beginPath();ctx.moveTo(s*0.3,s*0.1);ctx.lineTo(s*0.1,s*0.4);ctx.stroke();
        // 短腿

        ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.strokeRect(-s*0.55,s*0.7,s*0.35,s*0.25);ctx.strokeRect(s*0.2,s*0.7,s*0.35,s*0.25);

      case'spider':{ // 蝎精：圆身体+多腿+毒刺

        for(let i=0;i<4;i++){
          const a=Math.PI*0.3+i*Math.PI*0.13;

          ctx.beginPath();ctx.moveTo(Math.cos(a)*s*0.5,Math.sin(a)*s*0.5);ctx.lineTo(Math.cos(a)*s*1.1,Math.sin(a)*s*0.9+lp);ctx.stroke();
          ctx.beginPath();ctx.moveTo(Math.cos(-a)*s*0.5,Math.sin(-a)*s*0.5);ctx.lineTo(Math.cos(-a)*s*1.1,Math.sin(-a)*s*0.9-lp);ctx.stroke();
        }

        ctx.fillStyle=fc;ctx.beginPath();ctx.moveTo(0,-s*0.6);ctx.lineTo(-s*0.15,-s*1.1);ctx.lineTo(s*0.15,-s*1.1);ctx.closePath();ctx.fill();ctx.stroke();

        ctx.fillStyle=fc;ctx.beginPath();ctx.ellipse(0,0,s*0.9,s*0.95,0,0,Math.PI*2);ctx.fill();

        // 鼻子

        ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(-s*0.32,-s*0.25,s*0.06,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(s*0.32,-s*0.25,s*0.06,0,Math.PI*2);ctx.fill();
        break;}
      case'firechild':{ // 烈火童：火焰造型
        const fl=Math.sin(this.walkPhase*3)*0.15+1;

        ctx.quadraticCurveTo(s*0.9,-s*0.3,s*0.6,s*0.7);

        ctx.quadraticCurveTo(-s*0.2,s*0.5,-s*0.6,s*0.7);
        ctx.quadraticCurveTo(-s*0.9,-s*0.3,0,-s*1.2*fl);

        ctx.shadowBlur=0;
        // 内层亮焰
        ctx.fillStyle='#ffd970';
        ctx.beginPath();ctx.moveTo(0,-s*0.7*fl);ctx.quadraticCurveTo(s*0.4,-s*0.1,s*0.25,s*0.4);ctx.quadraticCurveTo(0,s*0.3,-s*0.25,s*0.4);ctx.quadraticCurveTo(-s*0.4,-s*0.1,0,-s*0.7*fl);ctx.closePath();ctx.fill();
        // 眼
        drawCartoonEye(-s*0.2,-s*0.05,s*0.13,look);
        drawCartoonEye(s*0.2,-s*0.05,s*0.13,look);
        // 嘴
        drawCartoonMouth(s*0.3,s*0.15,true);
        break;}
      default:{
        ctx.fillStyle=fc;ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();ctx.stroke();
        drawCartoonEye(-s*0.25,0,s*0.15,look);drawCartoonEye(s*0.25,0,s*0.15,look);
      }
    }
  }
}
